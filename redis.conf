# Redis configuration file

# Basic configuration
bind 0.0.0.0
port 6379
# Nigdy nie zamykaj bezczynnych połączeń (0 = disabled)
timeout 0
# Wysyłaj TCP keepalive co 60 sekund
tcp-keepalive 60

# Security
# requirepass jest ustawione w docker-compose command: --requirepass
protected-mode yes
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG ""
rename-command SHUTDOWN ""
rename-command DEBUG ""
# rename-command EVAL ""  # Potrzebne dla Celery
# rename-command SCRIPT ""  # Potrzebne dla Celery

# Rate limiting
maxclients 100
tcp-backlog 511

# Memory management
maxmemory 100mb
maxmemory-policy allkeys-lru
maxmemory-samples 10
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 25
active-defrag-cycle-max 75

# Persistence
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error no
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir ./

# Logging
loglevel notice
logfile ""
# Security logging
slowlog-log-slower-than 10000
slowlog-max-len 128

# Other settings
daemonize no
supervised no
pidfile /data/redis_6379.pid

# Performance tuning
io-threads 4
io-threads-do-reads yes 
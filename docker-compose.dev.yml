services:
  static-init:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["/bin/bash", "-c", "python manage.py collectstatic --noinput --skip-checks"]
    volumes:
      - static_volume:/app/staticfiles
    env_file:
      - .env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=nc.settings.dev
      - TZ=Europe/Warsaw
      - DJANGO_DEBUG=1
    networks:
      - app_network
    user: "1001:1001"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: [ "/bin/bash", "-c", "python manage.py makemigrations && python manage.py migrate --database=zzz_default && gunicorn nc.wsgi:application --bind 0.0.0.0:8000 --workers 1 --timeout 300 --keep-alive 5 --reload" ]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    env_file:
      - .env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=nc.settings.dev
      - TZ=Europe/Warsaw
      - PYTHONUNBUFFERED=1
      - DJANGO_DEBUG=1
      - REDIS_PASSWORD=dev_password
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-ncadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-ncadminpass}
      - AWS_STORAGE_BUCKET_NAME=${S3_BUCKET_NAME:-nc-media}
      - AWS_S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - AWS_S3_REGION_NAME=${S3_REGION_NAME:-us-east-1}
      - AWS_S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-path}
      - AWS_S3_VERIFY=${S3_VERIFY_SSL:-false}
    restart: always
    networks:
      - app_network
    depends_on:
      redis:
        condition: service_started
      static-init:
        condition: service_completed_successfully
      minio-setup:
        condition: service_completed_successfully
    user: "1001:1001"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"  # Nginx będzie dostępny na porcie 8080
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - nginx_logs:/var/log/nginx
    environment:
      - TZ=Europe/Warsaw
    depends_on:
      - web
    restart: always
    networks:
      - app_network

  celery-default:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: [ "/bin/bash", "-c", "sleep 10 && celery -A nc.celery worker -Q default --loglevel=info --concurrency=2" ]
    volumes:
      - .:/app
      - celery_data:/var/lib/celery
    env_file:
      - .env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=nc.settings.dev
      - CELERY_STATE_DB=/var/lib/celery/worker_state_default
      - TZ=Europe/Warsaw
      # Usunięto C_FORCE_ROOT=true - nie uruchamiamy jako root
      - REDIS_PASSWORD=dev_password
      - CELERY_BROKER_URL=redis://:dev_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:dev_password@redis:6379/0
      - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
      - CELERY_WORKER_SEND_TASK_EVENTS=true
      - CELERY_TASK_SEND_SENT_EVENT=true
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-ncadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-ncadminpass}
      - AWS_STORAGE_BUCKET_NAME=${S3_BUCKET_NAME:-nc-media}
      - AWS_S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - AWS_S3_REGION_NAME=${S3_REGION_NAME:-us-east-1}
      - AWS_S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-path}
      - AWS_S3_VERIFY=${S3_VERIFY_SSL:-false}
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_started
      minio-setup:
        condition: service_completed_successfully
    restart: always
    networks:
      - app_network
    user: "1001:1001"

  celery-import:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: [ "/bin/bash", "-c", "sleep 10 && celery -A nc.celery worker -Q import --loglevel=info --concurrency=1" ]
    volumes:
      - .:/app
      - celery_data:/var/lib/celery
    env_file:
      - .env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=nc.settings.dev
      - CELERY_STATE_DB=/var/lib/celery/worker_state_import
      - TZ=Europe/Warsaw
      # Usunięto C_FORCE_ROOT=true - nie uruchamiamy jako root
      - REDIS_PASSWORD=dev_password
      - CELERY_BROKER_URL=redis://:dev_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:dev_password@redis:6379/0
      - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
      - CELERY_WORKER_SEND_TASK_EVENTS=true
      - CELERY_TASK_SEND_SENT_EVENT=true
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-ncadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-ncadminpass}
      - AWS_STORAGE_BUCKET_NAME=${S3_BUCKET_NAME:-nc-media}
      - AWS_S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - AWS_S3_REGION_NAME=${S3_REGION_NAME:-us-east-1}
      - AWS_S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-path}
      - AWS_S3_VERIFY=${S3_VERIFY_SSL:-false}
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_started
      minio-setup:
        condition: service_completed_successfully
    restart: always
    networks:
      - app_network
    user: "1001:1001"

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: [ "/bin/bash", "-c", "celery -A nc.celery beat --loglevel=info" ]
    volumes:
      - .:/app
    env_file:
      - .env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=nc.settings.dev
      - TZ=Europe/Warsaw
      - REDIS_PASSWORD=dev_password
      - CELERY_BROKER_URL=redis://:dev_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:dev_password@redis:6379/0
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-ncadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-ncadminpass}
      - AWS_STORAGE_BUCKET_NAME=${S3_BUCKET_NAME:-nc-media}
      - AWS_S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - AWS_S3_REGION_NAME=${S3_REGION_NAME:-us-east-1}
      - AWS_S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-path}
      - AWS_S3_VERIFY=${S3_VERIFY_SSL:-false}
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_started
      minio-setup:
        condition: service_completed_successfully
    restart: always
    networks:
      - app_network
    user: "1001:1001"

  flower:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: [ "/bin/bash", "-c", "sleep 120 && mkdir -p /tmp/flower && FLOWER_UNAUTHENTICATED_API=true celery -A nc.celery --broker=redis://:dev_password@redis:6379/0 flower --port=5555 --persistent=True --db=/tmp/flower/flower.db --inspect_timeout=30" ]
    ports:
      - "5555:5555"
    volumes:
      - .:/app
      - flower_data:/var/lib/flower
    env_file:
      - .env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=nc.settings.dev
      - TZ=Europe/Warsaw
      # Usunięto C_FORCE_ROOT=true - nie uruchamiamy jako root
      - REDIS_PASSWORD=dev_password
      - CELERY_BROKER_URL=redis://:dev_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:dev_password@redis:6379/0
      - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
      - CELERY_WORKER_SEND_TASK_EVENTS=true
      - CELERY_TASK_SEND_SENT_EVENT=true
      - CELERY_TASK_EVENTS=true
      - CELERY_WORKER_SEND_TASK_EVENTS=true
      - CELERY_TASK_SEND_SENT_EVENT=true
      - CELERY_TASK_TRACK_STARTED=true
      - CELERY_TASK_IGNORE_RESULT=false
      - CELERY_TASK_STORE_EAGER_RESULT=true
      - FLOWER_UNAUTHENTICATED_API=true
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-ncadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-ncadminpass}
      - AWS_STORAGE_BUCKET_NAME=${S3_BUCKET_NAME:-nc-media}
      - AWS_S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
      - AWS_S3_REGION_NAME=${S3_REGION_NAME:-us-east-1}
      - AWS_S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-path}
      - AWS_S3_VERIFY=${S3_VERIFY_SSL:-false}
    depends_on:
      redis:
        condition: service_started
      celery-default:
        condition: service_started
      minio-setup:
        condition: service_completed_successfully
    networks:
      - app_network
    user: "1001:1001"

  minio:
    image: minio/minio:RELEASE.2024-12-18T10-31-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ncadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ncadminpass}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost:9001}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - app_network

  minio-setup:
    image: minio/mc:RELEASE.2024-12-18T10-31-44Z
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ncadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ncadminpass}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-nc-media}
    entrypoint: >
      /bin/sh -c "
      until mc alias set minio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        sleep 5;
      done;
      mc mb -p minio/$$S3_BUCKET_NAME || true;
      "
    networks:
      - app_network

  redis:
    image: redis:7.2-alpine
    # Port dostępny tylko lokalnie dla development - zmieniony z 6379 na 6380
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    environment:
      - TZ=Europe/Warsaw
      - REDIS_PASSWORD=dev_password
    restart: always
    networks:
      - app_network
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass dev_password --maxmemory 100mb --maxmemory-policy allkeys-lru

volumes:
  static_volume:
  celery_data:
  flower_data:
  nginx_logs:
    driver: local
  minio_data:

networks:
  app_network:
    driver: bridge

# Blue-Green Deployment Configuration for NGINX

# Upstream dla Blue environment
upstream backend_blue {
    server web-blue:8000 max_fails=3 fail_timeout=30s;
}

# Upstream dla Green environment
upstream backend_green {
    server web-green:8000 max_fails=3 fail_timeout=30s;
}

# Aktywny backend - automatyczne przełączanie na podstawie pliku konfiguracyjnego
# Plik /etc/nginx/state/active_backend.conf jest aktualizowany przez skrypt deployment
# Wczytaj aktywny backend z pliku (jeśli istnieje)
# Jeśli plik nie istnieje, użyj domyślnego (green)
include /etc/nginx/state/active_backend.conf;

# Main server block
server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Resolver dla dynamicznego DNS (Docker internal DNS)
    resolver 127.0.0.11 valid=30s;

    # Logowanie
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Health check endpoint (nie przechodzi przez Django)
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Blue/Green status endpoint - odczytaj z pliku konfiguracyjnego
    location /deployment-status {
        access_log off;
        default_type application/json;
        # Prosty endpoint - zwraca plik konfiguracyjny jako JSON
        alias /etc/nginx/state/active_backend.conf;
        add_header Content-Type application/json;
    }

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Flower (Celery monitoring)
    location /flower/ {
        proxy_pass http://flower:5555/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_redirect off;
        proxy_buffering off;
    }

    # Django application - route to active backend
    location / {
        proxy_pass http://backend_active;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Deployment-Color "blue";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Disable response buffering for SSE/streaming
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# Server block dla portu 8001 (mapowany przez Docker z 8001:8001)
server {
    listen 8001;
    server_name _;
    client_max_body_size 10M;

    # Resolver dla dynamicznego DNS (Docker internal DNS)
    resolver 127.0.0.11 valid=30s;

    access_log /var/log/nginx/access_8001.log;
    error_log /var/log/nginx/error_8001.log warn;

    # Health check endpoint
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Blue/Green status endpoint - odczytaj z pliku konfiguracyjnego
    location /deployment-status {
        access_log off;
        default_type application/json;
        # Prosty endpoint - zwraca plik konfiguracyjny jako JSON
        alias /etc/nginx/state/active_backend.conf;
        add_header Content-Type application/json;
    }

    location / {
        proxy_pass http://backend_active;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # HTTP 1.1
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Error handling
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires max;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# Admin endpoint for switching between blue/green (internal only)
server {
    listen 8080;
    server_name _;
    allow 127.0.0.1;
    allow 172.16.0.0/12;  # Docker networks
    deny all;

    # Switch to blue - wywołuje skrypt przez docker exec
    location /switch/blue {
        access_log off;
        default_type application/json;
        # Użyj proxy do wywołania skryptu (lub użyj auth_request z zewnętrznym skryptem)
        return 200 '{"action":"switch","target":"blue","status":"use_script","note":"Use switch-blue-green.sh script"}';
    }

    # Switch to green - wywołuje skrypt przez docker exec
    location /switch/green {
        access_log off;
        default_type application/json;
        return 200 '{"action":"switch","target":"green","status":"use_script","note":"Use switch-blue-green.sh script"}';
    }

    # Status - zwróć informację o aktywnym backendzie
    location /status {
        access_log off;
        default_type application/json;
        return 200 '{"active":"green","blue":"available","green":"available","note":"Use switch-blue-green.sh to switch"}';
    }
}


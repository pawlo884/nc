name: Deploy Django App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: pawlo884
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ env.DOCKERHUB_USERNAME }}/django-app:latest
        
    - name: Debug SSH Key
      run: |
        echo "Checking if DEPLOY_KEY is set..."
        if [ -n "${{ secrets.DEPLOY_KEY }}" ]; then
          echo "DEPLOY_KEY is set"
          echo "First line of key:"
          echo "${{ secrets.DEPLOY_KEY }}" | head -n 1
        else
          echo "DEPLOY_KEY is not set"
        fi
        
    - name: Deploy to DigitalOcean
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DROPLET_HOST }}
        username: ${{ secrets.DROPLET_USERNAME }}
        key: ${{ secrets.DEPLOY_KEY }}
        port: 22
        debug: true
        command_timeout: 20m
        script: |
          echo "Testing connection..."
          whoami
          pwd
          ls -la ~/.ssh/
          echo "Creating /srv/app directory..."
          sudo mkdir -p /srv/app
          sudo chown ${{ secrets.DROPLET_USERNAME }}:${{ secrets.DROPLET_USERNAME }} /srv/app
          echo "Copying project files..."
          git clone https://github.com/pawlo884/nc.git /tmp/nc
          cp -r /tmp/nc/* /srv/app/
          rm -rf /tmp/nc
          echo "Copying docker-compose.yml..."
          cat > /srv/app/docker-compose.yml << 'EOL'
          services:
            web:
              image: ${DOCKERHUB_USERNAME}/django-app:latest
              command: gunicorn nc.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
              volumes:
                - .:/app
              ports:
                - "8000:8000"
              env_file:
                - .env.${ENVIRONMENT:-prod}
              restart: always
          EOL
          echo "Logging in to Docker Hub..."
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          echo "Deploying application..."
          cd /srv/app
          echo "Current directory: $(pwd)"
          echo "Directory contents: $(ls -la)"
          echo "Docker Hub username: ${{ env.DOCKERHUB_USERNAME }}"
          DOCKERHUB_USERNAME=${{ env.DOCKERHUB_USERNAME }} docker-compose pull
          DOCKERHUB_USERNAME=${{ env.DOCKERHUB_USERNAME }} docker-compose up -d
          echo "Container logs:"
          docker-compose logs web 
name: Deploy Django App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: pawlo884
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    # Build obrazu produkcyjnego z cache (Dockerfile.prod)
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.prod  # ← PRODUCTION Dockerfile
        push: true
        tags: ${{ env.DOCKERHUB_USERNAME }}/django-app:latest
        cache-from: type=registry,ref=${{ env.DOCKERHUB_USERNAME }}/django-app:buildcache
        cache-to: type=registry,ref=${{ env.DOCKERHUB_USERNAME }}/django-app:buildcache,mode=max
        build-args: |
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
        
    - name: Deploy to DigitalOcean
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DROPLET_HOST }}
        username: ${{ secrets.DROPLET_USERNAME }}
        key: ${{ secrets.DEPLOY_KEY }}
        port: 22
        debug: true
        command_timeout: 20m
        script: |
          echo "Testing connection..."
          whoami
          pwd
          echo "Creating /srv/app directory..."
          sudo mkdir -p /srv/app
          sudo chown ${{ secrets.DROPLET_USERNAME }}:${{ secrets.DROPLET_USERNAME }} /srv/app
          echo "Updating project files..."
          cd /srv/app
          if [ -d .git ]; then
            echo "Repository exists, updating..."
            git fetch origin
            git reset --hard origin/main
          else
            echo "Repository does not exist, cloning..."
            rm -rf * .[!.]* ..?*
            git clone https://github.com/pawlo884/nc.git .
          fi
          echo "Checking repository contents..."
          ls -la
          echo "Copying nginx configuration..."
          cat > /srv/app/nginx.conf << 'EOL'
          server {
              listen 80;
              server_name _;

              access_log /var/log/nginx/access.log;
              error_log /var/log/nginx/error.log debug;

              location / {
                  proxy_pass http://web:8000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }

              location /static/ {
                  alias /app/staticfiles/;
                  access_log off;
                  expires max;
              }
          }
          EOL
          echo "Logging in to Docker Hub..."
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          echo "Deploying application with ZERO-DOWNTIME..."
          cd /srv/app
          echo "Current directory: $(pwd)"
          echo "Directory contents: $(ls -la)"
          echo "Docker Hub username: ${{ env.DOCKERHUB_USERNAME }}"
          
          # Daj uprawnienia wykonania
          chmod +x deploy-from-registry.sh
          
          # Uruchom zero-downtime deployment (używa docker-compose.prod.yml)
          export DOCKERHUB_USERNAME=${{ env.DOCKERHUB_USERNAME }}
          bash deploy-from-registry.sh
          
          echo ""
          echo "📊 Final status:"
          docker-compose -f docker-compose.prod.yml ps
          
          echo ""
          echo "📋 Ostatnie logi:"
          docker-compose -f docker-compose.prod.yml logs --tail=50 web 
name: Check Branch

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  check-merge-conflicts:
    name: Sprawdź konflikty z main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sprawdź konflikty merge z main
        run: |
          echo "🔄 Sprawdzam czy branch można zmergować z main..."
          git fetch origin main:main

          # Zapisujemy aktualny HEAD przed merge
          CURRENT_HEAD=$(git rev-parse HEAD)

          # Próbujemy zmergować z main (bez commitowania)
          if git merge --no-commit --no-ff main 2>&1; then
            echo "✅ Brak konfliktów merge z main!"
            # Resetujemy do stanu przed merge
            git reset --hard "$CURRENT_HEAD"
          else
            MERGE_STATUS=$?
            echo "❌ Wykryto konflikty merge z main!"
            echo "Branch nie może być zmergowany z main bez konfliktów."
            # Anulujemy merge jeśli jest aktywny
            if [ -f .git/MERGE_HEAD ]; then
              git merge --abort
            else
              git reset --hard "$CURRENT_HEAD"
            fi
            exit $MERGE_STATUS
          fi

  check-django:
    name: Sprawdź Django (testy i migracje)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sprawdź migracje Django
        env:
          DEFAULT_DB_NAME: test_db
          DEFAULT_DB_USER: postgres
          DEFAULT_DB_PASSWORD: postgres
          DEFAULT_DB_HOST: localhost
          DEFAULT_DB_PORT: 5432
          MPD_DB_NAME: test_db
          MPD_DB_USER: postgres
          MPD_DB_PASSWORD: postgres
          MPD_DB_HOST: localhost
          MPD_DB_PORT: 5432
          MATTERHORN1_DB_NAME: test_db
          MATTERHORN1_DB_USER: postgres
          MATTERHORN1_DB_PASSWORD: postgres
          MATTERHORN1_DB_HOST: localhost
          MATTERHORN1_DB_PORT: 5432
          WEB_AGENT_DB_NAME: test_db
          WEB_AGENT_DB_USER: postgres
          WEB_AGENT_DB_PASSWORD: postgres
          WEB_AGENT_DB_HOST: localhost
          WEB_AGENT_DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
        run: |
          echo "🔄 Sprawdzam migracje Django..."
          python manage.py makemigrations --check --dry-run --settings=nc.settings.dev || {
            echo "❌ Wykryto niezapisane migracje!"
            echo "Uruchom: python manage.py makemigrations --settings=nc.settings.dev"
            exit 1
          }
          echo "✅ Wszystkie migracje są zapisane!"

      - name: Uruchom testy Django
        env:
          DEFAULT_DB_NAME: test_db
          DEFAULT_DB_USER: postgres
          DEFAULT_DB_PASSWORD: postgres
          DEFAULT_DB_HOST: localhost
          DEFAULT_DB_PORT: 5432
          MPD_DB_NAME: test_db
          MPD_DB_USER: postgres
          MPD_DB_PASSWORD: postgres
          MPD_DB_HOST: localhost
          MPD_DB_PORT: 5432
          MATTERHORN1_DB_NAME: test_db
          MATTERHORN1_DB_USER: postgres
          MATTERHORN1_DB_PASSWORD: postgres
          MATTERHORN1_DB_HOST: localhost
          MATTERHORN1_DB_PORT: 5432
          WEB_AGENT_DB_NAME: test_db
          WEB_AGENT_DB_USER: postgres
          WEB_AGENT_DB_PASSWORD: postgres
          WEB_AGENT_DB_HOST: localhost
          WEB_AGENT_DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          DJANGO_SETTINGS_MODULE: nc.settings.dev
        run: |
          echo "🧪 Uruchamiam testy Django..."
          python manage.py test --settings=nc.settings.dev --verbosity=2 --keepdb || {
            echo "❌ Testy nie przeszły!"
            exit 1
          }
          echo "✅ Wszystkie testy przeszły!"

  check-code-quality:
    name: Sprawdź jakość kodu (linting i formatowanie)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          fi

      - name: Sprawdź formatowanie Prettier (tylko kod JS/TS/CSS, bez JSON i markdown)
        run: |
          if [ -f package.json ]; then
            echo "🎨 Sprawdzam formatowanie Prettier (tylko pliki kodu JS/TS/CSS)..."
            # Sprawdzamy tylko pliki kodu JS/TS/CSS, pomijamy JSON i markdown
            npx prettier --check "**/*.{js,jsx,ts,tsx,css,scss}" --ignore-path .gitignore || {
              echo "❌ Formatowanie nie jest poprawne!"
              echo "Uruchom: npx prettier --write \"**/*.{js,jsx,ts,tsx,css,scss}\""
              exit 1
            }
            echo "✅ Formatowanie kodu poprawne!"
          else
            echo "ℹ️ Brak package.json, pomijam sprawdzenie formatowania"
          fi

      - name: Sprawdź linting ESLint
        run: |
          if [ -f package.json ]; then
            echo "🔍 Sprawdzam linting ESLint..."
            npm run lint || {
              echo "❌ Linting wykrył błędy!"
              echo "Uruchom: npm run lint:fix"
              exit 1
            }
            echo "✅ Linting przeszedł!"
          else
            echo "ℹ️ Brak package.json, pomijam sprawdzenie lintingu"
          fi

  summary:
    name: Podsumowanie
    runs-on: ubuntu-latest
    needs: [check-merge-conflicts, check-django, check-code-quality]
    if: always()

    steps:
      - name: Podsumowanie sprawdzeń
        run: |
          echo "📊 Podsumowanie sprawdzeń brancha:"
          echo "✅ Sprawdzanie konfliktów: ${{ needs.check-merge-conflicts.result }}"
          echo "✅ Sprawdzanie Django: ${{ needs.check-django.result }}"
          echo "✅ Sprawdzanie jakości kodu: ${{ needs.check-code-quality.result }}"

          if [ "${{ needs.check-merge-conflicts.result }}" != "success" ] || \
             [ "${{ needs.check-django.result }}" != "success" ] || \
             [ "${{ needs.check-code-quality.result }}" != "success" ]; then
            echo "❌ Niektóre sprawdzenia nie przeszły!"
            exit 1
          fi

          echo "✅ Wszystkie sprawdzenia przeszły pomyślnie!"

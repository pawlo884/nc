name: Check Branch

# Tylko PR do main — bez push (koniec duplikatów push + pull_request)
on:
  pull_request:
    branches:
      - main

concurrency:
  group: check-branch-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Wykryj zmienione ścieżki
    runs-on: ubuntu-latest
    outputs:
      django: ${{ steps.filter.outputs.django }}
      code_quality: ${{ steps.filter.outputs.code_quality }}
      frontend_mpd: ${{ steps.filter.outputs.frontend_mpd }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Filtr ścieżek względem plików w PR
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # Na pull_request: lista plików z API GitHub (diff vs base PR)
          filters: |
            ci:
              - '.github/workflows/check-branch.yml'
            django:
              - 'src/**'
              - '**/requirements*.txt'
              - 'requirements*.txt'
            code_quality:
              - '**/*.{js,jsx,ts,tsx,css,scss}'
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'
              - '.prettierrc'
              - '.prettierrc.*'
              - '.prettierignore'
              - 'eslint.config.*'
              - '.eslintrc*'
            frontend_mpd:
              - 'frontend/mpd/**'

  check-merge-conflicts:
    name: Sprawdź konflikty z main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kod
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sprawdź konflikty merge z main
        run: |
          echo "🔄 Sprawdzam czy branch można zmergować z main..."
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git fetch origin main:main 2>&1 || {
            echo "⚠️ Nie można pobrać main jako lokalny branch, używam origin/main..."
            git fetch origin main 2>&1 || exit 1
          }

          CURRENT_HEAD=$(git rev-parse HEAD)
          MAIN_HEAD=$(git rev-parse main 2>/dev/null || git rev-parse origin/main)

          set +e
          git merge --no-commit --no-ff $MAIN_HEAD > /tmp/merge_output.txt 2>&1
          MERGE_EXIT=$?
          set -e

          if [ $MERGE_EXIT -eq 0 ]; then
            echo "✅ Brak konfliktów merge z main!"
            git reset --hard "$CURRENT_HEAD"
          else
            echo "❌ Wykryto konflikty merge z main!"
            echo "Branch nie może być zmergowany z main bez konfliktów."
            if [ -f .git/MERGE_HEAD ]; then
              echo "Konfliktujące pliki:"
              git ls-files -u | cut -f 2 | sort -u || echo "Nie można określić plików"
              git merge --abort
            else
              echo "Merge nie został rozpoczęty, resetuję do HEAD"
              git reset --hard "$CURRENT_HEAD"
            fi
            exit 1
          fi

  # Testy/migracje są wyłączone — bez Postgres/Redis i bez pełnego pip.
  # Gdy włączysz prawdziwe testy, przywróć services + pip + manage.py test.
  check-django:
    name: Sprawdź Django (składnia Python)
    needs: changes
    if: needs.changes.outputs.django == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: compileall (szybka weryfikacja składni)
        run: |
          echo "🐍 Sprawdzam składnię Python (compileall) — pełne testy Django są wyłączone w CI."
          python -m compileall -q src
          echo "✅ Składnia OK"

      # --- Pełne testy (wyłączone) — odkomentuj services powyżej + te kroki ---
      # - name: Install dependencies
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install -r src/requirements.ci.txt
      # - name: Sprawdź migracje Django
      #   if: false
      # - name: Uruchom testy Django
      #   if: false

  check-code-quality:
    name: Sprawdź jakość kodu (linting i formatowanie)
    needs: changes
    if: needs.changes.outputs.code_quality == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          fi

      - name: Sprawdź formatowanie Prettier (tylko kod JS/TS/CSS, bez JSON i markdown)
        run: |
          if [ -f package.json ]; then
            echo "🎨 Sprawdzam formatowanie Prettier (tylko pliki kodu JS/TS/CSS)..."
            set +e
            PRETTIER_OUTPUT=$(npx prettier --check "**/*.{js,jsx,ts,tsx,css,scss}" --ignore-path .gitignore 2>&1)
            PRETTIER_EXIT=$?
            set -e

            if echo "$PRETTIER_OUTPUT" | grep -q "No files matching the pattern were found"; then
              echo "ℹ️ Brak plików JS/TS/CSS do sprawdzenia"
              echo "✅ Formatowanie pominięte - brak plików do sprawdzenia"
            elif [ $PRETTIER_EXIT -ne 0 ]; then
              echo "$PRETTIER_OUTPUT"
              echo "❌ Formatowanie nie jest poprawne!"
              echo "Uruchom: npx prettier --write \"**/*.{js,jsx,ts,tsx,css,scss}\""
              exit 1
            else
              echo "$PRETTIER_OUTPUT"
              echo "✅ Formatowanie kodu poprawne!"
            fi
          else
            echo "ℹ️ Brak package.json, pomijam sprawdzenie formatowania"
          fi

      - name: Sprawdź linting ESLint
        run: |
          if [ -f package.json ]; then
            echo "🔍 Sprawdzam linting ESLint..."
            set +e
            LINT_OUTPUT=$(npm run lint 2>&1)
            LINT_EXIT=$?
            set -e

            if echo "$LINT_OUTPUT" | grep -q "No files matching"; then
              echo "ℹ️ Brak plików JS/TS do sprawdzenia"
              echo "✅ Linting pominięty - brak plików do sprawdzenia"
            elif [ $LINT_EXIT -ne 0 ]; then
              echo "$LINT_OUTPUT"
              echo "❌ Linting wykrył błędy!"
              echo "Uruchom: npm run lint:fix"
              exit 1
            else
              echo "$LINT_OUTPUT"
              echo "✅ Linting przeszedł!"
            fi
          else
            echo "ℹ️ Brak package.json, pomijam sprawdzenie lintingu"
          fi

  check-mpd-frontend:
    name: Sprawdź MPD React (tsc + vite build)
    needs: changes
    if: needs.changes.outputs.frontend_mpd == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mpd

    steps:
      - name: Checkout kod
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/mpd/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc -b && vite build)
        run: npm run build

  summary:
    name: Podsumowanie
    runs-on: ubuntu-latest
    needs:
      [
        changes,
        check-merge-conflicts,
        check-django,
        check-code-quality,
        check-mpd-frontend,
      ]
    if: always()

    steps:
      - name: Podsumowanie sprawdzeń
        run: |
          echo "📊 Podsumowanie sprawdzeń brancha:"
          echo "🔎 django=${{ needs.changes.outputs.django }} code_quality=${{ needs.changes.outputs.code_quality }} frontend_mpd=${{ needs.changes.outputs.frontend_mpd }} ci=${{ needs.changes.outputs.ci }}"
          echo "• konflikty: ${{ needs.check-merge-conflicts.result }}"
          echo "• Django: ${{ needs.check-django.result }}"
          echo "• jakość kodu: ${{ needs.check-code-quality.result }}"
          echo "• MPD React: ${{ needs.check-mpd-frontend.result }}"

          check_ok() {
            local name="$1"
            local result="$2"
            if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
              return 0
            fi
            echo "❌ $name nie przeszło ($result)"
            return 1
          }

          FAILED=0
          check_ok "konflikty" "${{ needs.check-merge-conflicts.result }}" || FAILED=1
          check_ok "Django" "${{ needs.check-django.result }}" || FAILED=1
          check_ok "jakość kodu" "${{ needs.check-code-quality.result }}" || FAILED=1
          check_ok "MPD React" "${{ needs.check-mpd-frontend.result }}" || FAILED=1

          if [ "$FAILED" -ne 0 ]; then
            echo "❌ Niektóre sprawdzenia nie przeszły!"
            exit 1
          fi

          echo "✅ Wszystkie wymagane sprawdzenia OK (skipped = celowo pominięte)."

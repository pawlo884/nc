name: Check Branch

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  check-merge-conflicts:
    name: Sprawdź konflikty z main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sprawdź konflikty merge z main
        run: |
          echo "🔄 Sprawdzam czy branch można zmergować z main..."
          # Konfiguruj git user (wymagane dla operacji git)
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Pobierz main
          git fetch origin main:main 2>&1 || {
            echo "⚠️ Nie można pobrać main jako lokalny branch, używam origin/main..."
            git fetch origin main 2>&1 || exit 1
          }

          # Zapisujemy aktualny HEAD przed merge
          CURRENT_HEAD=$(git rev-parse HEAD)
          MAIN_HEAD=$(git rev-parse main 2>/dev/null || git rev-parse origin/main)

          # Próbujemy zmergować z main (bez commitowania)
          set +e
          git merge --no-commit --no-ff $MAIN_HEAD > /tmp/merge_output.txt 2>&1
          MERGE_EXIT=$?
          set -e

          if [ $MERGE_EXIT -eq 0 ]; then
            echo "✅ Brak konfliktów merge z main!"
            git reset --hard "$CURRENT_HEAD"
          else
            echo "❌ Wykryto konflikty merge z main!"
            echo "Branch nie może być zmergowany z main bez konfliktów."
            
            # Pokaż konfliktujące pliki
            if [ -f .git/MERGE_HEAD ]; then
              echo "Konfliktujące pliki:"
              git ls-files -u | cut -f 2 | sort -u || echo "Nie można określić plików"
              git merge --abort
            else
              echo "Merge nie został rozpoczęty, resetuję do HEAD"
              git reset --hard "$CURRENT_HEAD"
            fi
            exit 1
          fi

  check-django:
    name: Sprawdź Django (testy i migracje)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('src/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Sprawdź migracje Django
        # ⚠️ WYŁĄCZONE: Wymaga konfiguracji MinIO/S3
        if: false
        env:
          DEFAULT_DB_NAME: test_db
          DEFAULT_DB_USER: postgres
          DEFAULT_DB_PASSWORD: postgres
          DEFAULT_DB_HOST: localhost
          DEFAULT_DB_PORT: 5432
          MPD_DB_NAME: test_db
          MPD_DB_USER: postgres
          MPD_DB_PASSWORD: postgres
          MPD_DB_HOST: localhost
          MPD_DB_PORT: 5432
          MATTERHORN1_DB_NAME: test_db
          MATTERHORN1_DB_USER: postgres
          MATTERHORN1_DB_PASSWORD: postgres
          MATTERHORN1_DB_HOST: localhost
          MATTERHORN1_DB_PORT: 5432
          WEB_AGENT_DB_NAME: test_db
          WEB_AGENT_DB_USER: postgres
          WEB_AGENT_DB_PASSWORD: postgres
          WEB_AGENT_DB_HOST: localhost
          WEB_AGENT_DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
        run: |
          echo "🔄 Sprawdzam migracje Django..."
          cd src
          python manage.py makemigrations --check --dry-run --settings=core.settings.dev || {
            echo "❌ Wykryto niezapisane migracje!"
            echo "Uruchom: python manage.py makemigrations --settings=core.settings.dev"
            exit 1
          }
          echo "✅ Wszystkie migracje są zapisane!"

      - name: Uruchom testy Django
        # ⚠️ WYŁĄCZONE: Testy wymagają skonfigurowania wielu baz danych
        if: false
        env:
          DEFAULT_DB_NAME: test_db
          DEFAULT_DB_USER: postgres
          DEFAULT_DB_PASSWORD: postgres
          DEFAULT_DB_HOST: localhost
          DEFAULT_DB_PORT: 5432
          MPD_DB_NAME: test_db
          MPD_DB_USER: postgres
          MPD_DB_PASSWORD: postgres
          MPD_DB_HOST: localhost
          MPD_DB_PORT: 5432
          MATTERHORN1_DB_NAME: test_db
          MATTERHORN1_DB_USER: postgres
          MATTERHORN1_DB_PASSWORD: postgres
          MATTERHORN1_DB_HOST: localhost
          MATTERHORN1_DB_PORT: 5432
          WEB_AGENT_DB_NAME: test_db
          WEB_AGENT_DB_USER: postgres
          WEB_AGENT_DB_PASSWORD: postgres
          WEB_AGENT_DB_HOST: localhost
          WEB_AGENT_DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          DJANGO_SETTINGS_MODULE: core.settings.dev
        run: |
          echo "🧪 Uruchamiam testy Django..."
          cd src
          # Django test automatycznie tworzy testową bazę danych z prefiksem test_
          # i uruchamia migracje dla wszystkich baz danych
          # Używamy --noinput aby pominąć pytania interaktywne
          python manage.py test --settings=core.settings.dev --verbosity=2 --noinput || {
            echo "❌ Testy nie przeszły!"
            echo "ℹ️ Jeśli problem dotyczy wielu baz danych, sprawdź konfigurację DATABASES w settings"
            exit 1
          }
          echo "✅ Wszystkie testy przeszły!"

  check-code-quality:
    name: Sprawdź jakość kodu (linting i formatowanie)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          fi

      - name: Sprawdź formatowanie Prettier (tylko kod JS/TS/CSS, bez JSON i markdown)
        run: |
          if [ -f package.json ]; then
            echo "🎨 Sprawdzam formatowanie Prettier (tylko pliki kodu JS/TS/CSS)..."
            # Sprawdzamy tylko pliki kodu JS/TS/CSS, pomijamy JSON i markdown
            npx prettier --check "**/*.{js,jsx,ts,tsx,css,scss}" --ignore-path .gitignore || {
              echo "❌ Formatowanie nie jest poprawne!"
              echo "Uruchom: npx prettier --write \"**/*.{js,jsx,ts,tsx,css,scss}\""
              exit 1
            }
            echo "✅ Formatowanie kodu poprawne!"
          else
            echo "ℹ️ Brak package.json, pomijam sprawdzenie formatowania"
          fi

      - name: Sprawdź linting ESLint
        run: |
          if [ -f package.json ]; then
            echo "🔍 Sprawdzam linting ESLint..."
            # ESLint automatycznie używa .eslintignore jeśli istnieje
            # Obsługujemy przypadek gdy nie ma plików do sprawdzenia
            set +e
            LINT_OUTPUT=$(npm run lint -- --ignore-path .eslintignore 2>&1)
            LINT_EXIT=$?
            set -e
            
            if echo "$LINT_OUTPUT" | grep -q "No files matching"; then
              echo "ℹ️ Brak plików JS/TS do sprawdzenia (wszystkie są ignorowane lub nie ma plików)"
              echo "✅ Linting pominięty - brak plików do sprawdzenia"
            elif [ $LINT_EXIT -ne 0 ]; then
              echo "$LINT_OUTPUT"
              echo "❌ Linting wykrył błędy!"
              echo "Uruchom: npm run lint:fix"
              exit 1
            else
              echo "$LINT_OUTPUT"
              echo "✅ Linting przeszedł!"
            fi
          else
            echo "ℹ️ Brak package.json, pomijam sprawdzenie lintingu"
          fi

  summary:
    name: Podsumowanie
    runs-on: ubuntu-latest
    needs: [check-merge-conflicts, check-django, check-code-quality]
    if: always()

    steps:
      - name: Podsumowanie sprawdzeń
        run: |
          echo "📊 Podsumowanie sprawdzeń brancha:"
          echo "✅ Sprawdzanie konfliktów: ${{ needs.check-merge-conflicts.result }}"
          echo "✅ Sprawdzanie Django: ${{ needs.check-django.result }}"
          echo "✅ Sprawdzanie jakości kodu: ${{ needs.check-code-quality.result }}"

          if [ "${{ needs.check-merge-conflicts.result }}" != "success" ] || \
             [ "${{ needs.check-django.result }}" != "success" ] || \
             [ "${{ needs.check-code-quality.result }}" != "success" ]; then
            echo "❌ Niektóre sprawdzenia nie przeszły!"
            exit 1
          fi

          echo "✅ Wszystkie sprawdzenia przeszły pomyślnie!"

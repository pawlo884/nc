name: Deploy to VPS

on:
  # Uruchamiaj po zakończeniu workflow "Release" na gałęzi main
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]
  # Ręczne wywołanie z UI
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Wykonuj tylko, jeśli workflow Release zakończył się sukcesem
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    
    steps:
    - name: Test SSH connection
      uses: appleboy/ssh-action@master
      id: ssh-test
      continue-on-error: true
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        timeout: 30s
        script: |
          echo "Testing SSH connection..."
          whoami
          echo "✅ SSH connection successful!"
    
    - name: Check SSH connection result
      if: steps.ssh-test.outcome != 'success'
      run: |
        echo "❌ SSH connection failed!"
        echo "Please check:"
        echo "1. Port 22 is forwarded in router (external port 22 → internal IP:22)"
        echo "2. Firewall allows port 22 on server"
        echo "3. SSH service is running on server"
        echo "4. VPS_HOST secret is correct (public IP or domain)"
        echo "5. Server is accessible from internet"
        exit 1
    
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        debug: true
        timeout: 60s
        command_timeout: 20m
        script: |
          echo "🚀 Starting deployment..."
          
          # Aktualizuj kod aplikacji
          cd /home/pawel/apps/nc
          echo "📥 Pulling latest code..."
          git fetch origin
          git reset --hard origin/main
          
          # Ustaw uprawnienia dla katalogów migrations (potrzebne dla makemigrations w kontenerze)
          echo "🔐 Ustawianie uprawnień dla katalogów migrations..."
          find . -type d -name migrations -exec chmod 755 {} \; 2>/dev/null || true
          find . -type f -path "*/migrations/*.py" -exec chmod 644 {} \; 2>/dev/null || true
          
          # Blue-Green Deployment - Zero Downtime
          echo "🔵🟢 Starting Blue-Green Deployment..."
          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1
          export ENVIRONMENT=prod
          
          # Nadaj uprawnienia wykonywania dla skryptu
          chmod +x scripts/deploy/deploy-blue-green.sh
          
          # Wykonaj blue-green deployment
          ./scripts/deploy/deploy-blue-green.sh deploy
          
          # Pokaż status po deploy
          echo "📊 Deployment status:"
          ./scripts/deploy/deploy-blue-green.sh status
          
          # Czekaj aż kontener się uruchomi
          echo "⏳ Waiting for containers to be ready..."
          sleep 20
          
          # Migracje są już w komendzie startowej web, ale sprawdzamy czy się wykonały
          echo "🔄 Checking if migrations completed..."
          
          # Sprawdź status kontenerów blue-green
          echo "📊 Container status (Blue-Green):"
          docker-compose -f docker-compose.blue-green.yml ps || echo "⚠️ Could not get status!"
          
          # Sprawdź który environment jest aktywny
          ACTIVE_ENV=$(./scripts/deploy/deploy-blue-green.sh status | grep "🔀 Active environment:" | awk '{print $4}')
          echo "🔀 Active environment: ${ACTIVE_ENV}"
          
          # Jeśli nie ma aktywnego environment, sprawdź kontenery
          if [ -z "$ACTIVE_ENV" ] || [ "$ACTIVE_ENV" = "" ]; then
            echo "⚠️ Nie można wykryć aktywnego environment, sprawdzam kontenery..."
            if docker ps --format '{{.Names}}' | grep -q "nc-web-blue"; then
              ACTIVE_ENV="blue"
            elif docker ps --format '{{.Names}}' | grep -q "nc-web-green"; then
              ACTIVE_ENV="green"
            else
              echo "❌ Żaden environment nie działa!"
              exit 1
            fi
          fi
          
          # Sprawdź migracje i bazę danych na aktywnym kontenerze
          echo "🗄️ Checking database migrations..."
          docker exec nc-web-${ACTIVE_ENV} python manage.py showmigrations --settings=nc.settings.prod || echo "⚠️ Could not check migrations"
          
          # Sprawdź czy baza jest pusta (czy są tabele)
          echo "📋 Checking if database is initialized..."
          docker exec nc-web-${ACTIVE_ENV} python manage.py shell --settings=nc.settings.prod -c "from django.db import connection; print('Tables:', connection.introspection.table_names())" || echo "⚠️ Could not check database"
          
          echo "📋 Recent logs (active web):"
          docker logs nc-web-${ACTIVE_ENV} --tail 50 || echo "⚠️ Could not get logs"
          
          echo "✅ Deployment completed!"

name: Deploy to VPS

on:
  # Uruchamiaj po zakończeniu workflow "Release" na gałęzi main
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]
  # Ręczne wywołanie z UI
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Wykonuj tylko, jeśli workflow Release zakończył się sukcesem
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    
    steps:
    - name: Test SSH connection
      uses: appleboy/ssh-action@master
      id: ssh-test
      continue-on-error: true
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        timeout: 30s
        script: |
          echo "Testing SSH connection..."
          whoami
          echo "✅ SSH connection successful!"
    
    - name: Check SSH connection result
      if: steps.ssh-test.outcome != 'success'
      run: |
        echo "❌ SSH connection failed!"
        echo "Please check:"
        echo "1. Port 22 is forwarded in router (external port 22 → internal IP:22)"
        echo "2. Firewall allows port 22 on server"
        echo "3. SSH service is running on server"
        echo "4. VPS_HOST secret is correct (public IP or domain)"
        echo "5. Server is accessible from internet"
        exit 1
    
    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        debug: true
        timeout: 60s
        command_timeout: 20m
        script: |
          echo "🚀 Starting deployment..."
          
          # Aktualizuj kod aplikacji
          cd /home/pawel/apps/nc
          echo "📥 Pulling latest code..."
          git fetch origin
          git reset --hard origin/main
          
          # Ustaw uprawnienia dla katalogów migrations (potrzebne dla makemigrations w kontenerze)
          echo "🔐 Ustawianie uprawnień dla katalogów migrations..."
          find . -type d -name migrations -exec chmod 755 {} \; 2>/dev/null || true
          find . -type f -path "*/migrations/*.py" -exec chmod 644 {} \; 2>/dev/null || true
          
          # Przebuduj i zrestartuj kontenery (używa docker-compose.prod.yml)
          # Używamy BuildKit dla lepszej wydajności i cache'owania
          echo "🐳 Rebuilding and restarting containers..."
          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1
          
          # WAŻNE: Nie odtwarzaj postgres i redis - tylko kontenery aplikacji!
          echo "🛑 Zatrzymywanie kontenerów aplikacji (postgres i redis zostają nietknięte)..."
          docker-compose -f docker-compose.prod.yml stop web celery-default celery-import celery-beat flower nginx static-init || true
          
          echo "🔨 Rebuilding kontenerów aplikacji..."
          docker-compose -f docker-compose.prod.yml build --no-cache web celery-default celery-import celery-beat flower static-init
          
          echo "🚀 Uruchamianie wszystkich kontenerów (postgres i redis pozostają nietknięte)..."
          docker-compose -f docker-compose.prod.yml up -d
          
          # Czekaj aż kontener się uruchomi
          echo "⏳ Waiting for containers to be ready..."
          sleep 20
          
          # Migracje są już w komendzie startowej web, ale sprawdzamy czy się wykonały
          echo "🔄 Checking if migrations completed..."
          
          # Sprawdź status
          echo "📊 Container status:"
          docker-compose -f docker-compose.prod.yml ps || echo "⚠️ Could not get status!"
          
          # Sprawdź migracje i bazę danych
          echo "🗄️ Checking database migrations..."
          docker-compose -f docker-compose.prod.yml exec -T web python manage.py showmigrations --settings=nc.settings.prod || echo "⚠️ Could not check migrations"
          
          # Sprawdź czy baza jest pusta (czy są tabele)
          echo "📋 Checking if database is initialized..."
          docker-compose -f docker-compose.prod.yml exec -T web python manage.py shell --settings=nc.settings.prod -c "from django.db import connection; print('Tables:', connection.introspection.table_names())" || echo "⚠️ Could not check database"
          
          echo "📋 Recent logs (web):"
          docker-compose -f docker-compose.prod.yml logs web --tail 50 || echo "⚠️ Could not get logs"
          
          echo "✅ Deployment completed!"

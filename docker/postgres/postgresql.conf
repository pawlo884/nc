# PostgreSQL Configuration for Fast First Connection
# Rozwiązuje problem wolnego pierwszego połączenia po czasie idle

# ==========================================
# CONNECTION SETTINGS
# ==========================================

# TCP Keepalive - utrzymuj połączenia żywe
tcp_keepalives_idle = 60           # 1 minuta przed pierwszym keepalive
tcp_keepalives_interval = 10       # 10 sekund między keepalive
tcp_keepalives_count = 5           # 5 prób przed uznaniem za martwe

# Connection pooling
max_connections = 200              # Max połączeń (domyślnie 100)
superuser_reserved_connections = 3

# ==========================================
# IDLE TIMEOUT - Nie zamykaj połączeń za szybko
# ==========================================
idle_in_transaction_session_timeout = 600000  # 10 minut (zamiast domyślnych)
statement_timeout = 300000                     # 5 minut max query time

# ==========================================
# PERFORMANCE - Szybsze pierwsze połączenie
# ==========================================

# Memory settings - więcej cache = szybsze query
shared_buffers = 256MB             # Pamięć dla cache (domyślnie 128MB)
effective_cache_size = 1GB         # Przewidywana dostępna pamięć OS
work_mem = 16MB                    # Pamięć dla sort/hash operations
maintenance_work_mem = 128MB       # Pamięć dla VACUUM, CREATE INDEX

# Query planner
random_page_cost = 1.1             # SSD friendly (domyślnie 4.0)
effective_io_concurrency = 200     # Concurrent IO operations (SSD)

# Checkpoints - rzadsze = mniej IO
checkpoint_timeout = 15min         # Czas między checkpoints
checkpoint_completion_target = 0.9 # Rozłóż checkpoint w czasie
max_wal_size = 2GB                 # Większy WAL = rzadsze checkpoints
min_wal_size = 512MB

# ==========================================
# LOGGING - Monitoruj wolne połączenia
# ==========================================
log_connections = on
log_disconnections = on
log_duration = off                 # Nie loguj każdego query
log_min_duration_statement = 1000  # Loguj query > 1s
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_timezone = 'Europe/Warsaw'

# ==========================================
# AUTOVACUUM - Nie blokuj podczas peak hours
# ==========================================
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 60s           # Sprawdzaj co minutę

# ==========================================
# LOCALE
# ==========================================
timezone = 'Europe/Warsaw'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'

# ==========================================
# REPLICATION (dla przyszłości)
# ==========================================
wal_level = replica
max_wal_senders = 3


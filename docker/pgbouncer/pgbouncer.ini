[databases]
; WSZYSTKIE 3 bazy Django - każda z własnym poolem
zzz_default = host=postgres port=5432 dbname=zzz_default user=nc password=prod_password pool_size=25
zzz_matterhorn1 = host=postgres port=5432 dbname=zzz_matterhorn1 user=nc password=prod_password pool_size=25
zzz_MPD = host=postgres port=5432 dbname=zzz_MPD user=nc password=prod_password pool_size=25

[pgbouncer]
; Transaction pooling - kompatybilny z CONN_MAX_AGE=0
pool_mode = transaction

; Connection limits
max_client_conn = 1000
default_pool_size = 25
reserve_pool_size = 10
reserve_pool_timeout = 3

; Server connection settings
server_idle_timeout = 600
server_lifetime = 3600
server_connect_timeout = 15

; Query settings
query_timeout = 0
query_wait_timeout = 120

; Per-database limits
max_db_connections = 100
max_user_connections = 100

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
verbose = 0

; Admin
admin_users = nc
stats_users = nc

; Listen
listen_addr = 0.0.0.0
listen_port = 5432

; Auth
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt


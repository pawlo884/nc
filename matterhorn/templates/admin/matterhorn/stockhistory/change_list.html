{% extends "admin/change_list.html" %}
{% load i18n admin_urls static admin_list %}

{% block object-tools-items %}
    {% if show_actions %}
        {% for action in actions %}
            <li>
                <a href="{{ action.url }}" class="addlink" title="{{ action.description }}">
                    {{ action.label }}
                </a>
            </li>
        {% endfor %}
    {% endif %}
    {{ block.super }}
{% endblock %}

<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background-color: #f5f5f5;
        }
        
        form {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            max-width: 700px;
            margin: 0 auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        form p {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        form div {
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eaeaea;
            background: #f9f9f9;
            border-radius: 5px;
            margin-bottom: 8px;
        }
        
        form div:last-of-type {
            border-bottom: none;
        }
        
        form div a {
            text-decoration: none;
            color: #4CAF50;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        
        form div a:hover {
            color: #388E3C;
            text-decoration: underline;
        }
        
        button[type="submit"] {
            margin-top: 20px;
            padding: 10px 15px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: block;
            width: 100%;
            font-size: 16px;
        }
        
        button[type="submit"]:hover {
            background-color: #357ae8;
        }
        
    </style>
</head>



{% load custom_filters %}

<form method="GET" action="{% url 'matterhorn:add_new_product' %}">
    <input type="hidden" name="referrer" value="{{ referrer }}">
    <input type="hidden" name="product_id" value="{{ product.id }}">
    <p>Czy przypisać "{{ product.name }}" do istniejącego produktu?</p>
    {% for match in matches %}
        <div>
            Dopasowano do: "{{ match.0 }}" (score: {{ match.1 }})
            <a href="{% url 'matterhorn:add_new_product' %}?manual_confirm=1&product_id={{ product.id }}&confirmed_product_id={{ existing_products|get_item:match.0 }}&referrer={{ referrer }}">
                ✅ Potwierdź wybór
            </a>
        </div>
    {% endfor %}
    <button type="submit" name="manual_confirm" value="1">Dodaj jako nowy</button>
</form>

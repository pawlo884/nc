server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self';" always;

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts - ważne dla długich requestów
        proxy_connect_timeout 10s;      # Czas na połączenie z backendem
        proxy_send_timeout 60s;         # Czas na wysłanie requestu
        proxy_read_timeout 60s;         # Czas na odczyt odpowiedzi (1 minuta max)
        
        # Buffering - wyłączone dla szybszej odpowiedzi
        proxy_buffering off;
        proxy_request_buffering off;
        
        # HTTP version
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /static/ {
        alias /app/staticfiles/;
        access_log /var/log/nginx/static_access.log;
        error_log /var/log/nginx/static_error.log;
        expires max;
        add_header Cache-Control "public, immutable";
        # Włącz autoindex dla debugowania (opcjonalnie)
        # autoindex on;
        # Dodaj typy MIME dla plików CSS i JS
        types {
            text/css css;
            application/javascript js;
            image/png png;
            image/jpeg jpg jpeg;
            image/gif gif;
            image/svg+xml svg;
        }
        default_type application/octet-stream;
    }
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static:10m rate=30r/s;

# Security headers
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

server {
    listen 80;
    server_name _;

    # Logi z rotacją
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # Ograniczenia rozmiaru
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    # Ukryj wersję Nginx
    server_tokens off;

    # Blokuj nieprawidłowe nagłówki Host (bardziej elastyczne dla development)
    if ($host !~* ^(localhost|127\.0\.0\.1|192\.168\.|10\.|172\.|209\.38\.208\.114)$) {
        return 444;
    }

    # Blokuj podejrzane żądania
    location ~* \.(php|asp|aspx|jsp)$ {
        return 444;
    }

    # API z rate limiting
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
    }

    # Pliki statyczne z cache i rate limiting
    location /static/ {
        limit_req zone=static burst=50 nodelay;
        alias /app/staticfiles/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Debug-Path $request_filename;
        
        # Kompresja
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/css application/javascript image/svg+xml;
    }

    # Główna aplikacja
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
    }

    # Blokuj dostęp do plików konfiguracyjnych
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Blokuj dostęp do plików backup
    location ~* \.(bak|backup|old|orig|save|swp|tmp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
} 
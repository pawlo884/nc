services:
  static-init:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: nc-django-app:latest
    command:
    - /bin/bash
    - -c
    - echo '🔧 Zbieranie plików statycznych...' && python manage.py collectstatic --noinput
      --clear --verbosity 1 && echo '✅ Pliki statyczne zebrane' && ls -la /app/staticfiles/admin/css/
      | head -5
    volumes:
    - /mnt/data2tb/docker/volumes/nc_static_volume:/app/staticfiles
    env_file:
    - .env.${ENVIRONMENT:-prod}
    environment:
    - DJANGO_SETTINGS_MODULE=nc.settings.prod
    - TZ=Europe/Warsaw
    - DJANGO_ENV=prod
    networks:
    - nc_network
    user: 1001:1001
  # ⚠️⚠️⚠️  NIETYKALNY KONTENER - NIGDY NIE DOTYKAĆ!  ⚠️⚠️⚠️
  # Ten kontener zawiera dane produkcyjne i jest całkowicie nietykalny.
  # ❌ NIGDY nie używaj dla niego: --force-recreate, stop, rm, restart
  # ✅ Tylko sprawdzaj czy działa (docker ps) i jego zdrowie (health check)
  # Jeśli ten kontener nie działa - deployment MUSI się zatrzymać!
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    env_file:
    - .env.${ENVIRONMENT:-prod}
    environment:
      POSTGRES_USER: ${DEFAULT_DB_USER:-nc}
      POSTGRES_PASSWORD: ${DEFAULT_DB_PASSWORD:-prod_password}
      POSTGRES_DB: ${DEFAULT_DB_NAME:-zzz_default}
      TZ: Europe/Warsaw
    command:
    - postgres
    - -c
    - config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${DEFAULT_DB_USER:-nc}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
    - 5432:5432
    volumes:
    - /mnt/data2tb/docker/volumes/nc_postgres_data:/var/lib/postgresql/data
    - ./docker/postgres/initdb.d:/docker-entrypoint-initdb.d:ro
    - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
    - nc_network
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: nc-django-app:latest
    command:
    - /bin/bash
    - -c
    - find /app -type d -name migrations -exec chmod 755 {} \; 2>/dev/null || true
      && find /app -type f -path '*/migrations/*.py' -exec chmod 644 {} \; 2>/dev/null
      || true && echo "🔄 Uruchamiam migracje..." && python manage.py migrate --database=default
      --noinput && python manage.py migrate admin_interface --database=default --noinput
      && python manage.py migrate matterhorn1 --database=matterhorn1 --noinput &&
      python manage.py migrate MPD --database=MPD --noinput && echo "✅ Migracje zakończone"
      && gunicorn nc.wsgi:application --bind
      0.0.0.0:8000 --workers 2 --worker-class sync --timeout 300 --keep-alive 5 --max-requests
      1000 --max-requests-jitter 100 --preload --access-logfile - --error-logfile
      - --log-level warning --capture-output --worker-tmp-dir /dev/shm --graceful-timeout
      30 --limit-request-line 8190 --limit-request-fields 100 --limit-request-field_size
      8190
    ports:
    - 8000:8000
    volumes:
    - .:/app
    - /mnt/data2tb/docker/volumes/nc_static_volume:/app/staticfiles
    - /mnt/data2tb/docker/volumes/nc_media_volume:/app/media
    env_file:
    - .env.${ENVIRONMENT:-prod}
    environment:
    - DJANGO_SETTINGS_MODULE=nc.settings.prod
    - TZ=Europe/Warsaw
    - DJANGO_ENV=prod
    - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-ncadmin}
    - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-ncadminpass}
    - AWS_STORAGE_BUCKET_NAME=${S3_BUCKET_NAME:-nc-media}
    - AWS_S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
    - AWS_S3_REGION_NAME=${S3_REGION_NAME:-us-east-1}
    - AWS_S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-path}
    - AWS_S3_VERIFY=${S3_VERIFY_SSL:-false}
    restart: always
    networks:
    - nc_network
    depends_on:
    - postgres
    - redis
    - static-init
    user: 1001:1001
  nginx:
    image: nginx:alpine
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./nginx.conf:/etc/nginx/conf.d/default.conf
    - /mnt/data2tb/docker/volumes/nc_static_volume:/app/staticfiles
    - /mnt/data2tb/docker/volumes/nc_nginx_logs:/var/log/nginx
    environment:
    - TZ=Europe/Warsaw
    depends_on:
    - web
    - static-init
    restart: always
    networks:
    - nc_network
  celery-default:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: nc-django-app:latest
    command:
    - /bin/bash
    - -c
    - sleep 20 && celery -A nc.celery worker -Q default --loglevel=info --concurrency=1
      --max-memory-per-child=150000 --without-gossip --without-mingle --without-heartbeat
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    volumes:
    - .:/app
    - /mnt/data2tb/docker/volumes/nc_celery_data:/var/lib/celery
    env_file:
    - .env.${ENVIRONMENT:-prod}
    environment:
    - DJANGO_SETTINGS_MODULE=nc.settings.prod
    - CELERY_STATE_DB=/var/lib/celery/worker_state_default
    - TZ=Europe/Warsaw
    - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-prod_password}@redis:6379/0
    - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-prod_password}@redis:6379/0
    - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
    - CELERY_WORKER_SEND_TASK_EVENTS=true
    - CELERY_TASK_SEND_SENT_EVENT=true
    - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-ncadmin}
    - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-ncadminpass}
    - AWS_STORAGE_BUCKET_NAME=${S3_BUCKET_NAME:-nc-media}
    - AWS_S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
    - AWS_S3_REGION_NAME=${S3_REGION_NAME:-us-east-1}
    - AWS_S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-path}
    - AWS_S3_VERIFY=${S3_VERIFY_SSL:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    restart: always
    networks:
    - nc_network
    user: 1001:1001
  celery-import:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: nc-django-app:latest
    command:
    - /bin/bash
    - -c
    - sleep 20 && celery -A nc.celery worker -Q import --loglevel=info --concurrency=1
      --max-memory-per-child=150000 --without-gossip --without-mingle --without-heartbeat
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    volumes:
    - .:/app
    - /mnt/data2tb/docker/volumes/nc_celery_data:/var/lib/celery
    env_file:
    - .env.${ENVIRONMENT:-prod}
    environment:
    - DJANGO_SETTINGS_MODULE=nc.settings.prod
    - CELERY_STATE_DB=/var/lib/celery/worker_state_import
    - TZ=Europe/Warsaw
    - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-prod_password}@redis:6379/0
    - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-prod_password}@redis:6379/0
    - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
    - CELERY_WORKER_SEND_TASK_EVENTS=true
    - CELERY_TASK_SEND_SENT_EVENT=true
    - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-ncadmin}
    - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-ncadminpass}
    - AWS_STORAGE_BUCKET_NAME=${S3_BUCKET_NAME:-nc-media}
    - AWS_S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
    - AWS_S3_REGION_NAME=${S3_REGION_NAME:-us-east-1}
    - AWS_S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-path}
    - AWS_S3_VERIFY=${S3_VERIFY_SSL:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    restart: always
    networks:
    - nc_network
    user: 1001:1001
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: nc-django-app:latest
    command:
    - /bin/bash
    - -c
    - sleep 20 && celery -A nc.celery beat --loglevel=info
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    volumes:
    - .:/app
    env_file:
    - .env.${ENVIRONMENT:-prod}
    environment:
    - DJANGO_SETTINGS_MODULE=nc.settings.prod
    - TZ=Europe/Warsaw
    - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-prod_password}@redis:6379/0
    - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-prod_password}@redis:6379/0
    - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
    - CELERY_WORKER_SEND_TASK_EVENTS=true
    - CELERY_TASK_SEND_SENT_EVENT=true
    - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-ncadmin}
    - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-ncadminpass}
    - AWS_STORAGE_BUCKET_NAME=${S3_BUCKET_NAME:-nc-media}
    - AWS_S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
    - AWS_S3_REGION_NAME=${S3_REGION_NAME:-us-east-1}
    - AWS_S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-path}
    - AWS_S3_VERIFY=${S3_VERIFY_SSL:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    restart: always
    networks:
    - nc_network
    user: 1001:1001
  redis:
    image: redis:7.2-alpine
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-prod_password}
    volumes:
    - /mnt/data2tb/docker/volumes/nc_redis_data:/data
    - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
    - nc_network
    healthcheck:
      test:
      - CMD
      - redis-cli
      - -a
      - ${REDIS_PASSWORD:-prod_password}
      - ping
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
  flower:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: nc-django-app:latest
    command:
    - /bin/bash
    - -c
    - sleep 20 && celery -A nc.celery --broker=redis://:${REDIS_PASSWORD:-prod_password}@redis:6379/0
      flower --port=5555 --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD} --persistent=True
      --db=/var/lib/flower/flower.db --inspect_timeout=30 --broker_api=redis://:${REDIS_PASSWORD:-prod_password}@redis:6379/0
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    ports:
    - 5555:5555
    volumes:
    - .:/app
    - /mnt/data2tb/docker/volumes/nc_flower_data:/var/lib/flower
    env_file:
    - .env.${ENVIRONMENT:-prod}
    environment:
    - DJANGO_SETTINGS_MODULE=nc.settings.prod
    - TZ=Europe/Warsaw
    - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-prod_password}@redis:6379/0
    - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-prod_password}@redis:6379/0
    - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
    - CELERY_WORKER_SEND_TASK_EVENTS=true
    - CELERY_TASK_SEND_SENT_EVENT=true
    - CELERY_TASK_EVENTS=true
    - CELERY_TASK_TRACK_STARTED=true
    - CELERY_TASK_IGNORE_RESULT=false
    - CELERY_TASK_STORE_EAGER_RESULT=true
    - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-ncadmin}
    - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-ncadminpass}
    - AWS_STORAGE_BUCKET_NAME=${S3_BUCKET_NAME:-nc-media}
    - AWS_S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://minio:9000}
    - AWS_S3_REGION_NAME=${S3_REGION_NAME:-us-east-1}
    - AWS_S3_ADDRESSING_STYLE=${S3_ADDRESSING_STYLE:-path}
    - AWS_S3_VERIFY=${S3_VERIFY_SSL:-false}
    depends_on:
    - postgres
    - redis
    - celery-default
    - celery-import
    networks:
    - nc_network
    user: 1001:1001
networks:
  nc_network:
    driver: bridge

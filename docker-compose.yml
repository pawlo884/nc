version: '3.8'

services:
  web:
    image: ${DOCKERHUB_USERNAME}/django-app:latest
    command: bash -c "python manage.py makemigrations && python manage.py migrate --database=default && gunicorn nc.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - logs_volume:/app/logs
    env_file:
      - .env.${ENVIRONMENT:-prod}
    environment:
      - DJANGO_SETTINGS_MODULE=nc.settings.prod
    restart: always
    networks:
      - app_network
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - nginx_logs:/var/log/nginx
    depends_on:
      - web
    restart: always
    networks:
      - app_network

  celery:
      image: ${DOCKERHUB_USERNAME}/django-app:latest
      command: celery -A nc worker --loglevel=info
      volumes:
        - .:/app
      env_file:
        - .env.${ENVIRONMENT:-prod}
      environment:
        - DJANGO_SETTINGS_MODULE=nc.settings.prod
      depends_on:
        - web
        - redis
      restart: always
      networks:
        - app_network

  celery-beat:
      image: ${DOCKERHUB_USERNAME}/django-app:latest
      command: celery -A nc beat --loglevel=info
      volumes:
        - .:/app
      env_file:
        - .env.${ENVIRONMENT:-prod}
      environment:
        - DJANGO_SETTINGS_MODULE=nc.settings.prod
      depends_on:
        - web
        - redis
      restart: always
      networks:
        - app_network

  redis:
      image: redis:latest
      ports:
        - "6379:6379"
      restart: always
      networks:
        - app_network

volumes:
  static_volume:
  nginx_logs:
  logs_volume:
    name: nc_logs

networks:
  app_network:
    driver: bridge
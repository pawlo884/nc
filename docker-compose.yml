services:
  web:
    image: ${DOCKERHUB_USERNAME}/django-app:latest
    command: ["/bin/bash", "-c", "python manage.py makemigrations && python manage.py migrate --database=default && gunicorn nc.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 300 --keep-alive 5 --max-requests 1000"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    env_file:
      - .env.${ENVIRONMENT:-prod}
    environment:
      - DJANGO_SETTINGS_MODULE=nc.settings.prod
      - TZ=Europe/Warsaw
    restart: always
    networks:
      - app_network
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - nginx_logs:/var/log/nginx
    environment:
      - TZ=Europe/Warsaw
    depends_on:
      - web
    restart: always
    networks:
      - app_network

  celery-import:
      image: ${DOCKERHUB_USERNAME}/django-app:latest
      command: ["/bin/bash", "-c", "sleep 10 && celery -A nc.celery worker -Q import_queue --loglevel=info --concurrency=1"]
      volumes:
        - .:/app
        - celery_data:/var/lib/celery
      env_file:
        - .env.${ENVIRONMENT:-prod}
      environment:
        - DJANGO_SETTINGS_MODULE=nc.settings.prod
        - CELERY_STATE_DB=/var/lib/celery/worker_state_import
        - TZ=Europe/Warsaw
        - C_FORCE_ROOT=true
        - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-twoje_silne_haslo}@redis:6379/0
        - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-twoje_silne_haslo}@redis:6379/0
        - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
        - CELERY_WORKER_SEND_TASK_EVENTS=true
        - CELERY_TASK_SEND_SENT_EVENT=true
      depends_on:
        - web
        - redis
      restart: always
      networks:
        - app_network

  celery-default:
      image: ${DOCKERHUB_USERNAME}/django-app:latest
      command: ["/bin/bash", "-c", "sleep 10 && celery -A nc.celery worker -Q default --loglevel=info --concurrency=1"]
      volumes:
        - .:/app
        - celery_data:/var/lib/celery
      env_file:
        - .env.${ENVIRONMENT:-prod}
      environment:
        - DJANGO_SETTINGS_MODULE=nc.settings.prod
        - CELERY_STATE_DB=/var/lib/celery/worker_state_default
        - TZ=Europe/Warsaw
        - C_FORCE_ROOT=true
        - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-twoje_silne_haslo}@redis:6379/0
        - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-twoje_silne_haslo}@redis:6379/0
        - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
        - CELERY_WORKER_SEND_TASK_EVENTS=true
        - CELERY_TASK_SEND_SENT_EVENT=true
      depends_on:
        - web
        - redis
      restart: always
      networks:
        - app_network

  celery-beat:
      image: ${DOCKERHUB_USERNAME}/django-app:latest
      command: ["/bin/bash", "-c", "celery -A nc.celery beat --loglevel=info"]
      volumes:
        - .:/app
      env_file:
        - .env.${ENVIRONMENT:-prod}
      environment:
        - DJANGO_SETTINGS_MODULE=nc.settings.prod
        - TZ=Europe/Warsaw
      depends_on:
        - web
        - redis
      restart: always
      networks:
        - app_network

  redis:
    image: redis:7.2-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-prod_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nc_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-prod_password}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  flower:
    image: ${DOCKERHUB_USERNAME}/django-app:latest
    command: ["/bin/bash", "-c", "sleep 20 && celery -A nc.celery --broker=redis://:${REDIS_PASSWORD:-twoje_silne_haslo}@redis:6379/0 flower --port=5555 --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD} --persistent=True --db=/var/lib/flower/flower.db --inspect_timeout=30 --broker_api=redis://:${REDIS_PASSWORD:-twoje_silne_haslo}@redis:6379/0"]
    ports:
      - "5555:5555"
    volumes:
      - .:/app
      - flower_data:/var/lib/flower
    env_file:
      - .env.${ENVIRONMENT:-prod}
    environment:
      - DJANGO_SETTINGS_MODULE=nc.settings.prod
      - TZ=Europe/Warsaw
      - C_FORCE_ROOT=true
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-twoje_silne_haslo}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-twoje_silne_haslo}@redis:6379/0
      - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
      - CELERY_WORKER_SEND_TASK_EVENTS=true
      - CELERY_TASK_SEND_SENT_EVENT=true
      - CELERY_TASK_EVENTS=true
      - CELERY_WORKER_SEND_TASK_EVENTS=true
      - CELERY_TASK_SEND_SENT_EVENT=true
      - CELERY_TASK_TRACK_STARTED=true
      - CELERY_TASK_IGNORE_RESULT=false
      - CELERY_TASK_STORE_EAGER_RESULT=true
    depends_on:
      - redis
      - celery-import
      - celery-default
    networks:
      - app_network

volumes:
  redis_data:
  static_volume:
  media_volume:
  postgres_data:
  celery_beat_data:
  celery_worker_data:
  nginx_logs:
  celery_data:
  flower_data:
    driver: local

networks:
  app_network:
    driver: bridge
  nc_network:
    driver: bridge
services:
  web:
    image: ${DOCKERHUB_USERNAME}/django-app:latest
    command: gunicorn nc.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    env_file:
      - .env.${ENVIRONMENT:-prod}
    environment:
      - DJANGO_SETTINGS_MODULE=nc.settings.prod
    restart: always
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - nginx_logs:/var/log/nginx
    depends_on:
      - web
    restart: always
    networks:
      - app_network

volumes:
  static_volume:
  nginx_logs:

networks:
  app_network:
    driver: bridge
services:
  static-init:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.dev
    # Usuwamy cały katalog i tworzymy na nowo, potem collectstatic bez --clear
    command: ['/bin/bash', '-c', 'rm -rf /app/staticfiles/* /app/staticfiles/.*[!.]* 2>/dev/null || true && mkdir -p /app/staticfiles && python manage.py collectstatic --noinput --skip-checks && chown -R 999:999 /app/staticfiles && chmod -R 755 /app/staticfiles']
    volumes:
      - static_volume:/app/staticfiles
    env_file:
      - ../.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - TZ=Europe/Warsaw
      - DJANGO_DEBUG=1
    networks:
      - app_network
    # Nie ustawiamy user, aby móc naprawić uprawnienia jako root

  web:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.dev
    command:
      [
        '/bin/bash',
        '-c',
        'python manage.py makemigrations && python manage.py migrate --database=zzz_default && gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 1 --timeout 300 --keep-alive 5 --reload',
      ]
    ports:
      - '127.0.0.1:8000:8000'  # Dostępny tylko lokalnie, nginx używa wewnętrznej sieci
    volumes:
      - ../src:/app
      - static_volume:/app/staticfiles
    env_file:
      - ../.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - TZ=Europe/Warsaw
      - PYTHONUNBUFFERED=1
      - DJANGO_DEBUG=1
      - REDIS_PASSWORD=dev_password
    restart: always
    networks:
      - app_network
    depends_on:
      redis:
        condition: service_healthy
      static-init:
        condition: service_completed_successfully
      postgres-ssh-tunnel:
        condition: service_healthy
    user: '999:999'
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  nginx:
    image: nginx:alpine
    ports:
      - '8090:80' # Nginx będzie dostępny na porcie 8090 (8080 zajęty przez Apache)
    volumes:
      - ../deployments/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - nginx_logs:/var/log/nginx
    environment:
      - TZ=Europe/Warsaw
    depends_on:
      - web
    restart: always
    networks:
      - app_network

  celery-default:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.dev
    command:
      [
        '/bin/bash',
        '-c',
        'sleep 10 && celery -A core.celery worker -Q default --loglevel=info --concurrency=2',
      ]
    volumes:
      - ../src:/app
      - celery_data:/var/lib/celery
    env_file:
      - ../.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - CELERY_STATE_DB=/var/lib/celery/worker_state_default
      - TZ=Europe/Warsaw
      # Nie uruchamiamy jako root - kontener już działa jako użytkownik 999:999
      - REDIS_PASSWORD=dev_password
      - CELERY_BROKER_URL=redis://:dev_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:dev_password@redis:6379/0
      - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
      - CELERY_WORKER_SEND_TASK_EVENTS=true
      - CELERY_TASK_SEND_SENT_EVENT=true
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy
      postgres-ssh-tunnel:
        condition: service_healthy
    restart: always
    networks:
      - app_network
    user: '999:999'
    cap_add:
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  celery-import:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.dev
    command:
      [
        '/bin/bash',
        '-c',
        'sleep 10 && celery -A core.celery worker -Q import --loglevel=info --concurrency=1',
      ]
    volumes:
      - ../src:/app
      - celery_data:/var/lib/celery
    env_file:
      - ../.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - CELERY_STATE_DB=/var/lib/celery/worker_state_import
      - TZ=Europe/Warsaw
      # Nie uruchamiamy jako root - kontener już działa jako użytkownik 999:999
      - REDIS_PASSWORD=dev_password
      - CELERY_BROKER_URL=redis://:dev_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:dev_password@redis:6379/0
      - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
      - CELERY_WORKER_SEND_TASK_EVENTS=true
      - CELERY_TASK_SEND_SENT_EVENT=true
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy
      postgres-ssh-tunnel:
        condition: service_healthy
    restart: always
    networks:
      - app_network
    user: '999:999'
    cap_add:
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  celery-beat:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.dev
    command: ['/bin/bash', '-c', 'celery -A core.celery beat --loglevel=info']
    volumes:
      - ../src:/app
    env_file:
      - ../.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - TZ=Europe/Warsaw
      - REDIS_PASSWORD=dev_password
      - CELERY_BROKER_URL=redis://:dev_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:dev_password@redis:6379/0
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy
      postgres-ssh-tunnel:
        condition: service_healthy
    restart: always
    networks:
      - app_network
    user: '999:999'
    cap_add:
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  flower:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.dev
    command:
      [
        '/bin/bash',
        '-c',
        'sleep 120 && mkdir -p /tmp/flower && FLOWER_UNAUTHENTICATED_API=true celery -A core.celery --broker=redis://:dev_password@redis:6379/0 flower --port=5555 --persistent=True --db=/tmp/flower/flower.db --inspect_timeout=30',
      ]
    ports:
      - '5555:5555'
    volumes:
      - ../src:/app
      - flower_data:/var/lib/flower
    env_file:
      - ../.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - TZ=Europe/Warsaw
      # Nie uruchamiamy jako root - kontener już działa jako użytkownik 999:999
      - REDIS_PASSWORD=dev_password
      - CELERY_BROKER_URL=redis://:dev_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:dev_password@redis:6379/0
      - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
      - CELERY_WORKER_SEND_TASK_EVENTS=true
      - CELERY_TASK_SEND_SENT_EVENT=true
      - CELERY_TASK_EVENTS=true
      - CELERY_TASK_TRACK_STARTED=true
      - CELERY_TASK_IGNORE_RESULT=false
      - CELERY_TASK_STORE_EAGER_RESULT=true
      - FLOWER_UNAUTHENTICATED_API=true
    depends_on:
      redis:
        condition: service_healthy
      celery-default:
        condition: service_started
    networks:
      - app_network
    user: '999:999'
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  redis:
    image: redis:7.2-alpine
    # Port dostępny tylko lokalnie dla development - zmieniony z 6379 na 6380
    ports:
      - '127.0.0.1:6380:6379'
    volumes:
      - ../deployments/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    environment:
      - TZ=Europe/Warsaw
      - REDIS_PASSWORD=dev_password
    restart: always
    networks:
      - app_network
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass dev_password --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'dev_password', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  postgres-ssh-tunnel:
    image: alpine:latest
    container_name: postgres-ssh-tunnel
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache openssh-client sshpass netcat-openbsd openssl socat
        PORT=$${SSH_PORT:-22}
        if [ -z "$$PORT" ]; then PORT=22; fi
        
        echo "=== Diagnostyka SSH Tunnel ==="
        echo "SSH_HOST: $${SSH_HOST:-212.127.93.27}"
        echo "SSH_USER: $${SSH_USER:-pawel}"
        echo "SSH_PORT: $$PORT"
        echo "Sprawdzanie klucza SSH..."
        
        # Sprawdź czy katalog .ssh istnieje
        mkdir -p /root/.ssh
        
        # Funkcja do uruchomienia SSH tunelu
        start_ssh_tunnel() {
          if [ -f /root/.ssh/id_ed25519 ]; then
            echo "[OK] Uzywam klucza SSH z volume"
            cp /root/.ssh/id_ed25519 /tmp/id_ed25519
            chmod 600 /tmp/id_ed25519
            export SSH_CONFIG_FILE=/dev/null
            ssh -F /dev/null -i /tmp/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o ExitOnForwardFailure=yes -o ConnectTimeout=10 -N -L 127.0.0.1:15434:localhost:5433 -p "$$PORT" "$$SSH_USER@$$SSH_HOST" &
            echo $$! > /tmp/ssh_tunnel.pid
          elif [ -n "$$SSH_KEY" ]; then
            echo "[OK] Uzywam klucza SSH z zmiennej srodowiskowej"
            if echo "$$SSH_KEY" | head -c 30 | grep -q "BEGIN"; then
              echo "$$SSH_KEY" > /tmp/id_ed25519
            else
              echo "$$SSH_KEY" | openssl base64 -d > /tmp/id_ed25519
              if [ $$? -ne 0 ]; then
                echo "[ERROR] Nie udalo sie zdekodowac klucza z base64"
                return 1
              fi
            fi
            chmod 600 /tmp/id_ed25519
            export SSH_CONFIG_FILE=/dev/null
            ssh -F /dev/null -i /tmp/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o ExitOnForwardFailure=yes -o ConnectTimeout=10 -N -L 127.0.0.1:15434:localhost:5433 -p "$$PORT" "$$SSH_USER@$$SSH_HOST" &
            echo $$! > /tmp/ssh_tunnel.pid
          elif [ -n "$$SSH_PASSWORD" ]; then
            echo "[OK] Uzywam hasla SSH"
            export SSHPASS="$$SSH_PASSWORD"
            sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o ExitOnForwardFailure=yes -o ConnectTimeout=10 -N -L 127.0.0.1:15434:localhost:5433 -p "$$PORT" "$$SSH_USER@$$SSH_HOST" &
            echo $$! > /tmp/ssh_tunnel.pid
          else
            echo "[ERROR] Nie znaleziono zadnego sposobu autentykacji SSH"
            return 1
          fi
          
          # Poczekaj aż tunnel się nawiąże
          sleep 5
          
          # Sprawdź czy tunnel działa
          for i in 1 2 3 4 5; do
            if nc -z 127.0.0.1 15434 2>/dev/null; then
              echo "[OK] SSH tunnel dziala na localhost:15434"
              return 0
            fi
            echo "[INFO] Oczekiwanie na SSH tunnel... ($$i/5)"
            sleep 2
          done
          
          echo "[ERROR] SSH tunnel nie dziala po 10 sekundach"
          if [ -f /tmp/ssh_tunnel.pid ]; then
            kill $$(cat /tmp/ssh_tunnel.pid) 2>/dev/null || true
            rm -f /tmp/ssh_tunnel.pid
          fi
          return 1
        }
        
        # Uruchom SSH tunnel po raz pierwszy (przed socat)
        if ! start_ssh_tunnel; then
          echo "[ERROR] Nie udalo sie uruchomic SSH tunnel"
          exit 1
        fi
        
        # Uruchom socat w tle (po uruchomieniu SSH tunnel)
        echo "[OK] Uruchamianie socat proxy na 0.0.0.0:5434 -> localhost:15434..."
        socat TCP-LISTEN:5434,fork,reuseaddr TCP:127.0.0.1:15434 &
        SOCAT_PID=$$!
        echo $$SOCAT_PID > /tmp/socat.pid
        
        # Poczekaj aż socat się uruchomi
        sleep 2
        
        # Monitoruj i restartuj SSH tunnel
        while true; do
          sleep 10
          
          # Sprawdź czy SSH tunnel nadal działa
          if [ -f /tmp/ssh_tunnel.pid ]; then
            SSH_PID=$$(cat /tmp/ssh_tunnel.pid)
            if ! kill -0 $$SSH_PID 2>/dev/null; then
              echo "[WARNING] Proces SSH tunnel ($$SSH_PID) nie dziala, restartowanie..."
              rm -f /tmp/ssh_tunnel.pid
              start_ssh_tunnel || echo "[ERROR] Nie udalo sie zrestartowac SSH tunnel"
            elif ! nc -z 127.0.0.1 15434 2>/dev/null; then
              echo "[WARNING] Port 15434 nie odpowiada, restartowanie SSH tunnel..."
              kill $$SSH_PID 2>/dev/null || true
              rm -f /tmp/ssh_tunnel.pid
              start_ssh_tunnel || echo "[ERROR] Nie udalo sie zrestartowac SSH tunnel"
            fi
          else
            echo "[WARNING] Brak pliku PID SSH tunnel, uruchamianie..."
            start_ssh_tunnel || echo "[ERROR] Nie udalo sie uruchomic SSH tunnel"
          fi
          
          # Sprawdź czy socat nadal działa (sprawdzamy port zamiast PID, bo fork tworzy wiele procesów)
          if ! nc -z localhost 5434 2>/dev/null; then
            echo "[ERROR] Port 5434 nie odpowiada, socat nie dziala - restartowanie kontenera..."
            exit 1
          fi
        done
    env_file:
      - ../.env.dev
    environment:
      SSH_HOST: ${SSH_HOST:-212.127.93.27}
      SSH_USER: ${SSH_USER:-pawel}
      SSH_PORT: ${SSH_PORT:-22}
    volumes:
      # Zamontuj katalog .ssh z hosta (Windows path - Docker Desktop automatycznie konwertuje)
      # Jeśli nie działa, użyj bezwzględnej ścieżki: /c/Users/pawlo/.ssh:/root/.ssh:ro
      - ${HOME}/.ssh:/root/.ssh:ro
    # Port nie jest mapowany na hosta - aplikacja w Dockerze łączy się bezpośrednio przez sieć Docker
    # Jeśli potrzebujesz dostępu z hosta, odkomentuj poniższą linię:
    # ports:
    #   - "127.0.0.1:5434:5434"
    networks:
      app_network:
        aliases:
          - postgres-ssh-tunnel
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5434 && nc -z localhost 15434 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.25'

volumes:
  static_volume:
  celery_data:
  flower_data:
  redis_data:
  nginx_logs:
    driver: local

networks:
  app_network:
    driver: bridge

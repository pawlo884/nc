services:
  static-init:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.dev
    command: ['/bin/bash', '-c', 'python manage.py collectstatic --noinput --skip-checks']
    volumes:
      - static_volume:/app/staticfiles
    env_file:
      - ../.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - TZ=Europe/Warsaw
      - DJANGO_DEBUG=1
    networks:
      - app_network
    user: '999:999'

  web:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.dev
    command:
      [
        '/bin/bash',
        '-c',
        'python manage.py makemigrations && python manage.py migrate --database=zzz_default && gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 1 --timeout 300 --keep-alive 5 --reload',
      ]
    ports:
      - '127.0.0.1:8000:8000'  # Dostępny tylko lokalnie, nginx używa wewnętrznej sieci
    volumes:
      - ../src:/app
      - static_volume:/app/staticfiles
    env_file:
      - ../.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - TZ=Europe/Warsaw
      - PYTHONUNBUFFERED=1
      - DJANGO_DEBUG=1
      - REDIS_PASSWORD=dev_password
    restart: always
    networks:
      - app_network
    depends_on:
      redis:
        condition: service_healthy
      static-init:
        condition: service_completed_successfully
      postgres-ssh-tunnel:
        condition: service_healthy
    user: '999:999'
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  nginx:
    image: nginx:alpine
    ports:
      - '8090:80' # Nginx będzie dostępny na porcie 8090 (8080 zajęty przez Apache)
    volumes:
      - ../deployments/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - nginx_logs:/var/log/nginx
    environment:
      - TZ=Europe/Warsaw
    depends_on:
      - web
    restart: always
    networks:
      - app_network

  celery-default:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.dev
    command:
      [
        '/bin/bash',
        '-c',
        'sleep 10 && celery -A core.celery worker -Q default --loglevel=info --concurrency=2',
      ]
    volumes:
      - ../src:/app
      - celery_data:/var/lib/celery
    env_file:
      - ../.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - CELERY_STATE_DB=/var/lib/celery/worker_state_default
      - TZ=Europe/Warsaw
      # Nie uruchamiamy jako root - kontener już działa jako użytkownik 999:999
      - REDIS_PASSWORD=dev_password
      - CELERY_BROKER_URL=redis://:dev_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:dev_password@redis:6379/0
      - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
      - CELERY_WORKER_SEND_TASK_EVENTS=true
      - CELERY_TASK_SEND_SENT_EVENT=true
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy
      postgres-ssh-tunnel:
        condition: service_healthy
    restart: always
    networks:
      - app_network
    user: '999:999'
    cap_add:
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  celery-import:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.dev
    command:
      [
        '/bin/bash',
        '-c',
        'sleep 10 && celery -A core.celery worker -Q import --loglevel=info --concurrency=1',
      ]
    volumes:
      - ../src:/app
      - celery_data:/var/lib/celery
    env_file:
      - ../.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - CELERY_STATE_DB=/var/lib/celery/worker_state_import
      - TZ=Europe/Warsaw
      # Nie uruchamiamy jako root - kontener już działa jako użytkownik 999:999
      - REDIS_PASSWORD=dev_password
      - CELERY_BROKER_URL=redis://:dev_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:dev_password@redis:6379/0
      - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
      - CELERY_WORKER_SEND_TASK_EVENTS=true
      - CELERY_TASK_SEND_SENT_EVENT=true
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy
      postgres-ssh-tunnel:
        condition: service_healthy
    restart: always
    networks:
      - app_network
    user: '999:999'
    cap_add:
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  celery-beat:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.dev
    command: ['/bin/bash', '-c', 'celery -A core.celery beat --loglevel=info']
    volumes:
      - ../src:/app
    env_file:
      - ../.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - TZ=Europe/Warsaw
      - REDIS_PASSWORD=dev_password
      - CELERY_BROKER_URL=redis://:dev_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:dev_password@redis:6379/0
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy
      postgres-ssh-tunnel:
        condition: service_healthy
    restart: always
    networks:
      - app_network
    user: '999:999'
    cap_add:
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  flower:
    build:
      context: ..
      dockerfile: deployments/docker/Dockerfile.dev
    command:
      [
        '/bin/bash',
        '-c',
        'sleep 120 && mkdir -p /tmp/flower && FLOWER_UNAUTHENTICATED_API=true celery -A core.celery --broker=redis://:dev_password@redis:6379/0 flower --port=5555 --persistent=True --db=/tmp/flower/flower.db --inspect_timeout=30',
      ]
    ports:
      - '5555:5555'
    volumes:
      - ../src:/app
      - flower_data:/var/lib/flower
    env_file:
      - ../.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.dev
      - TZ=Europe/Warsaw
      # Nie uruchamiamy jako root - kontener już działa jako użytkownik 999:999
      - REDIS_PASSWORD=dev_password
      - CELERY_BROKER_URL=redis://:dev_password@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:dev_password@redis:6379/0
      - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
      - CELERY_WORKER_SEND_TASK_EVENTS=true
      - CELERY_TASK_SEND_SENT_EVENT=true
      - CELERY_TASK_EVENTS=true
      - CELERY_TASK_TRACK_STARTED=true
      - CELERY_TASK_IGNORE_RESULT=false
      - CELERY_TASK_STORE_EAGER_RESULT=true
      - FLOWER_UNAUTHENTICATED_API=true
    depends_on:
      redis:
        condition: service_healthy
      celery-default:
        condition: service_started
    networks:
      - app_network
    user: '999:999'
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  redis:
    image: redis:7.2-alpine
    # Port dostępny tylko lokalnie dla development - zmieniony z 6379 na 6380
    ports:
      - '127.0.0.1:6380:6379'
    volumes:
      - ../deployments/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    environment:
      - TZ=Europe/Warsaw
      - REDIS_PASSWORD=dev_password
    restart: always
    networks:
      - app_network
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass dev_password --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'dev_password', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  postgres-ssh-tunnel:
    image: alpine:latest
    container_name: postgres-ssh-tunnel
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache openssh-client sshpass netcat-openbsd openssl socat
        PORT=$${SSH_PORT:-22}
        if [ -z "$$PORT" ]; then PORT=22; fi
        
        echo "=== Diagnostyka SSH Tunnel ==="
        echo "SSH_HOST: $${SSH_HOST:-212.127.93.27}"
        echo "SSH_USER: $${SSH_USER:-pawel}"
        echo "SSH_PORT: $$PORT"
        echo "Sprawdzanie klucza SSH..."
        
        # Sprawdź czy katalog .ssh istnieje
        mkdir -p /root/.ssh
        
        # Najpierw sprawdź czy klucz SSH jest zamontowany jako volume
        if [ -f /root/.ssh/id_ed25519 ]; then
          echo "[OK] Znaleziono klucz SSH zamontowany jako volume"
          # Skopiuj klucz do /tmp i ustaw uprawnienia (volume jest read-only)
          cp /root/.ssh/id_ed25519 /tmp/id_ed25519
          chmod 600 /tmp/id_ed25519
          # Ustaw zmienną środowiskową, żeby SSH ignorował config file (volume jest read-only)
          export SSH_CONFIG_FILE=/dev/null
          echo "Laczenie przez SSH tunnel z kluczem z volume..."
          # Uruchom SSH tunnel w tle na localhost:15434 (port wewnętrzny)
          ssh -F /dev/null -i /tmp/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=60 -o ServerAliveCountMax=3 -o ExitOnForwardFailure=yes -N -L 127.0.0.1:15434:localhost:5433 -p "$$PORT" "$$SSH_USER@$$SSH_HOST" &
          SSH_PID=$$!
          # Poczekaj chwilę aż tunnel się nawiąże
          sleep 3
          # Sprawdź czy tunnel działa
          if ! nc -z 127.0.0.1 15434; then
            echo "[ERROR] SSH tunnel nie dziala na localhost:15434"
            kill $$SSH_PID 2>/dev/null || true
            exit 1
          fi
          echo "[OK] SSH tunnel dziala na localhost:15434"
          # Uruchom socat proxy, które nasłuchuje na 0.0.0.0:5434 (dostępne dla innych kontenerów)
          # i przekierowuje do localhost:15434 (gdzie działa SSH tunnel)
          echo "[OK] Uruchamianie socat proxy na 0.0.0.0:5434 -> localhost:15434..."
          exec socat TCP-LISTEN:5434,fork,reuseaddr TCP:127.0.0.1:15434
        # Jeśli jest klucz SSH jako zmienna środowiskowa, użyj go
        elif [ -n "$$SSH_KEY" ]; then
          echo "[OK] Znaleziono SSH_KEY w zmiennej srodowiskowej (dlugosc: $$(echo -n $$SSH_KEY | wc -c) znakow)"
          # Jeśli klucz zaczyna się od "BEGIN", to jest tekstowy, w przeciwnym razie jest base64
          if echo "$$SSH_KEY" | head -c 30 | grep -q "BEGIN"; then
            echo "[OK] Wykryto klucz w formacie tekstowym"
            echo "$$SSH_KEY" > /tmp/id_ed25519
          else
            echo "[OK] Wykryto klucz w formacie base64, dekodowanie..."
            echo "$$SSH_KEY" | openssl base64 -d > /tmp/id_ed25519
            if [ $$? -ne 0 ]; then
              echo "[ERROR] Nie udalo sie zdekodowac klucza z base64"
              exit 1
            fi
          fi
          chmod 600 /tmp/id_ed25519
          # Ustaw zmienną środowiskową, żeby SSH ignorował config file (volume jest read-only)
          export SSH_CONFIG_FILE=/dev/null
          echo "Laczenie przez SSH tunnel z kluczem z zmiennej..."
          # Uruchom SSH tunnel w tle na localhost:15434
          ssh -F /dev/null -i /tmp/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=60 -o ServerAliveCountMax=3 -o ExitOnForwardFailure=yes -N -L 127.0.0.1:15434:localhost:5433 -p "$$PORT" "$$SSH_USER@$$SSH_HOST" &
          SSH_PID=$$!
          sleep 3
          if ! nc -z 127.0.0.1 15434; then
            echo "[ERROR] SSH tunnel nie dziala na localhost:15434"
            kill $$SSH_PID 2>/dev/null || true
            exit 1
          fi
          echo "[OK] SSH tunnel dziala na localhost:15434, uruchamianie socat proxy..."
          exec socat TCP-LISTEN:5434,fork,reuseaddr TCP:127.0.0.1:15434
        # W przeciwnym razie użyj hasła przez sshpass
        elif [ -n "$$SSH_PASSWORD" ]; then
          echo "[OK] Uzywam hasla SSH"
          export SSHPASS="$$SSH_PASSWORD"
          echo "Laczenie przez SSH tunnel z haslem..."
          # Uruchom SSH tunnel w tle na localhost:15434
          sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=60 -o ServerAliveCountMax=3 -o ExitOnForwardFailure=yes -N -L 127.0.0.1:15434:localhost:5433 -p "$$PORT" "$$SSH_USER@$$SSH_HOST" &
          SSH_PID=$$!
          sleep 3
          if ! nc -z 127.0.0.1 15434; then
            echo "[ERROR] SSH tunnel nie dziala na localhost:15434"
            kill $$SSH_PID 2>/dev/null || true
            exit 1
          fi
          echo "[OK] SSH tunnel dziala na localhost:15434, uruchamianie socat proxy..."
          exec socat TCP-LISTEN:5434,fork,reuseaddr TCP:127.0.0.1:15434
        else
          echo "[ERROR] Nie znaleziono zadnego sposobu autentykacji SSH"
          echo "Sprawdzam:"
          echo "  - Plik /root/.ssh/id_ed25519: $$([ -f /root/.ssh/id_ed25519 ] && echo 'ISTNIEJE' || echo 'BRAK')"
          echo "  - Zmienna SSH_KEY: $$([ -n "$$SSH_KEY" ] && echo 'USTAWIONA' || echo 'BRAK')"
          echo "  - Zmienna SSH_PASSWORD: $$([ -n "$$SSH_PASSWORD" ] && echo 'USTAWIONA' || echo 'BRAK')"
          echo ""
          echo "Rozwiazania:"
          echo "1. Ustaw SSH_KEY w .env.dev (base64): uruchom .\scripts\setup-ssh-key.ps1"
          echo "2. Ustaw SSH_PASSWORD w .env.dev"
          echo "3. Zamontuj klucz SSH jako volume (sprawdz czy Docker Desktop ma dostep do ~/.ssh)"
          exit 1
        fi
    env_file:
      - ../.env.dev
    environment:
      SSH_HOST: ${SSH_HOST:-212.127.93.27}
      SSH_USER: ${SSH_USER:-pawel}
      SSH_PORT: ${SSH_PORT:-22}
    volumes:
      # Zamontuj katalog .ssh z hosta (Windows path - Docker Desktop automatycznie konwertuje)
      # Jeśli nie działa, użyj bezwzględnej ścieżki: /c/Users/pawlo/.ssh:/root/.ssh:ro
      - ${HOME}/.ssh:/root/.ssh:ro
    # Port nie jest mapowany na hosta - aplikacja w Dockerze łączy się bezpośrednio przez sieć Docker
    # Jeśli potrzebujesz dostępu z hosta, odkomentuj poniższą linię:
    # ports:
    #   - "127.0.0.1:5434:5434"
    networks:
      app_network:
        aliases:
          - postgres-ssh-tunnel
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5434 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.25'

volumes:
  static_volume:
  celery_data:
  flower_data:
  redis_data:
  nginx_logs:
    driver: local

networks:
  app_network:
    driver: bridge

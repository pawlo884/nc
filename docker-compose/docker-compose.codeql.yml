# Lokalny CodeQL w Dockerze — BEZ GitHub Actions (bez minut CI).
#
# Uzycie (z roota repo):
#   docker compose -f docker-compose/docker-compose.codeql.yml run --rm codeql
#   CODEQL_LANGS=python,javascript docker compose -f docker-compose/docker-compose.codeql.yml run --rm codeql
#
# Albo: .\scripts\codeql-docker.ps1
#
# Wyniki: .codeql/*.sarif (rozszerzenie SARIF Viewer w Cursor/VS Code)

services:
  codeql:
    image: mcr.microsoft.com/cstsectools/codeql-container
    entrypoint: ['/bin/bash', '/opt/scripts/run.sh']
    working_dir: /workspace
    volumes:
      - ..:/workspace:ro
      - ../.codeql:/opt/results
      - ../scripts/codeql:/opt/scripts:ro
    environment:
      CODEQL_WORKSPACE: /workspace
      CODEQL_RESULTS_DIR: /opt/results
      CODEQL_LANGS: ${CODEQL_LANGS:-python}
      CODEQL_SUITE: ${CODEQL_SUITE:-security-and-quality}
    mem_limit: 8g

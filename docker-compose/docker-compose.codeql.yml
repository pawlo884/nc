# Lokalny CodeQL w Dockerze — BEZ GitHub Actions (bez minut CI).
#
# WAZNE: name: nc-codeql — osobny projekt Compose, zeby NIE kasowac
# kontenerow z docker-compose.dev.yml (ten sam katalog = ten sam project).
#
# Uzycie:
#   .\scripts\codeql-docker.ps1
#   docker compose -p nc-codeql -f docker-compose/docker-compose.codeql.yml run --rm codeql
#
# Wyniki: .codeql/*.sarif

name: nc-codeql

services:
  codeql:
    image: mcr.microsoft.com/cstsectools/codeql-container
    entrypoint: ['/bin/bash', '/opt/scripts/run.sh']
    working_dir: /workspace
    volumes:
      - ..:/workspace:ro
      - ../.codeql:/opt/results
      - ../scripts/codeql:/opt/scripts:ro
    environment:
      CODEQL_WORKSPACE: /workspace
      CODEQL_RESULTS_DIR: /opt/results
      CODEQL_LANGS: ${CODEQL_LANGS:-python}
      CODEQL_SUITE: ${CODEQL_SUITE:-security-and-quality}
    mem_limit: 8g

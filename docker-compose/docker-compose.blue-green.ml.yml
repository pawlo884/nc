# docker-compose.blue-green.ml.yml - ML worker dla BLUE-GREEN (PROD)
# Uruchamianie:
#   docker-compose -f docker-compose.blue-green.yml -f docker-compose.blue-green.ml.yml up -d celery-ml
services:
  celery-ml:
    image: ${DOCKERHUB_USERNAME:-pawlo884}/django-app-ml:latest
    command: ["/bin/bash", "-c", "sleep 20 && celery -A core.celery worker -Q ml --loglevel=info --concurrency=2 --max-memory-per-child=300000"]
    deploy:
      resources:
        limits:
          memory: 2G  # ML modele potrzebują więcej pamięci
        reservations:
          memory: 1G
    volumes:
      - ./src:/app
      - /mnt/data2tb/docker/volumes/nc_celery_data:/var/lib/celery
      - ml_models:/app/ml_models  # Cache dla pobranych modeli
    env_file:
      - ../.env.${ENVIRONMENT:-prod}
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.prod
      - CELERY_STATE_DB=/var/lib/celery/worker_state_ml
      - TZ=Europe/Warsaw
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-prod_password}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-prod_password}@redis:6379/0
      - CELERY_WORKER_ENABLE_REMOTE_CONTROL=true
      - CELERY_WORKER_SEND_TASK_EVENTS=true
      - CELERY_TASK_SEND_SENT_EVENT=true
      # Dla Sentence Transformers
      - TRANSFORMERS_CACHE=/app/ml_models/transformers
      - TORCH_HOME=/app/ml_models/torch
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - nc_network
    user: "1001:1001"

volumes:
  ml_models:
    driver: local



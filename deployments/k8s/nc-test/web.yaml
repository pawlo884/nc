# Django web — 2 repliki, RollingUpdate (wzorzec docelowy zamiast blue-green)
# Wymaga: Secret nc-env (scripts/k8s-test/create-secret.sh)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nc-web
  namespace: nc-test
  labels:
    app: nc-web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: nc-web
  template:
    metadata:
      labels:
        app: nc-web
    spec:
      containers:
        - name: web
          image: nc-django-app:test
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - >
              gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2
              --timeout 300 --keep-alive 5 --max-requests 1000 --max-requests-jitter 100
              --access-logfile - --error-logfile - --log-level info
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: core.settings.test
            - name: TZ
              value: Europe/Warsaw
            - name: DJANGO_ENV
              value: test
          envFrom:
            - secretRef:
                name: nc-env
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: nc-test.sowa.ch
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: nc-test.sowa.ch
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nc-web
  namespace: nc-test
  labels:
    app: nc-web
spec:
  type: ClusterIP
  sessionAffinity: None
  selector:
    app: nc-web
  ports:
    - name: http
      port: 8000
      targetPort: 8000

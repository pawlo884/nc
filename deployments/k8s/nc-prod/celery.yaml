apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-default
  namespace: nc-prod
  labels:
    app: celery-default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-default
  template:
    metadata:
      labels:
        app: celery-default
    spec:
      containers:
        - name: worker
          image: nc-django-app:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - >
              sleep 20 &&
              celery -A core.celery worker -Q default --loglevel=info --concurrency=1
              --max-memory-per-child=150000 --without-gossip --without-mingle --without-heartbeat
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: core.settings.prod
            - name: TZ
              value: Europe/Warsaw
            - name: DJANGO_ENV
              value: prod
            - name: CELERY_STATE_DB
              value: /var/lib/celery/worker_state_default
            - name: REDIS_HOST
              value: redis
            - name: CELERY_BROKER_URL
              value: ""
            - name: CELERY_RESULT_BACKEND
              value: ""
            - name: DEFAULT_DB_HOST
              value: host.k3s.internal
            - name: MPD_DB_HOST
              value: host.k3s.internal
            - name: MATTERHORN1_DB_HOST
              value: host.k3s.internal
            - name: WEB_AGENT_DB_HOST
              value: host.k3s.internal
            - name: TABU_DB_HOST
              value: host.k3s.internal
          envFrom:
            - secretRef:
                name: nc-env
          volumeMounts:
            - name: celery-state
              mountPath: /var/lib/celery
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: celery-state
          emptyDir: {}
---

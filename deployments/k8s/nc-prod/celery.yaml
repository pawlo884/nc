            - name: MPD_DB_HOST
              value: host.k3s.internal
            - name: MATTERHORN1_DB_HOST
              value: host.k3s.internal
            - name: WEB_AGENT_DB_HOST
              value: host.k3s.internal
            - name: TABU_DB_HOST
              value: host.k3s.internal
          envFrom:
            - secretRef:
                name: nc-env
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

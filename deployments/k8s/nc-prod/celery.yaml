  name: celery-beat
  namespace: nc-prod
  labels:
    app: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: beat
          image: nc-django-app:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - sleep 20 && celery -A core.celery beat --loglevel=info
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: core.settings.prod
            - name: TZ
              value: Europe/Warsaw
            - name: DJANGO_ENV
              value: prod
            - name: REDIS_HOST
              value: redis
            - name: CELERY_BROKER_URL
              value: ""
            - name: CELERY_RESULT_BACKEND

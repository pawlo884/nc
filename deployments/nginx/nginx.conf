server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Nagłówki bezpieczeństwa - nie dodajemy dla /static/ (dodawane tylko w location /)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Cloudflare - ustaw prawidłowy protokół z nagłówka Cloudflare
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;
    # Content-Security-Policy - Report-Only nie blokuje, tylko raportuje
    # Dla plików statycznych nie dodajemy CSP, aby nie blokować CSS/JS
    # CSP jest dodawane tylko dla głównej lokalizacji /, nie dla /static/

    # Health check endpoint (nie przechodzi przez Django)
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        # Debug - loguj wszystkie requesty
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log debug;
        
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cloudflare - jeśli jest nagłówek CF-Visitor z "scheme":"https", użyj https
        # W przeciwnym razie użyj $scheme (http dla portu 80)
        set $forwarded_proto $scheme;
        if ($http_cf_visitor ~* "scheme.*https") {
            set $forwarded_proto https;
        }
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        # Cloudflare headers
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Ray $http_cf_ray;
        
        # Timeouts dla stabilności
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # HTTP 1.1 dla lepszej wydajności
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Error handling
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    location /static/ {
        alias /app/staticfiles/;
        access_log /var/log/nginx/static_access.log;
        error_log /var/log/nginx/static_error.log;
        
        # Nagłówek diagnostyczny - potwierdza że nginx serwuje plik
        add_header X-Served-By "nginx" always;
        
        # Cache dla Cloudflare - krótszy czas dla dev
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        
        # Nagłówki CORS dla plików statycznych - zawsze dodawane (ważne dla Cloudflare)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Type" always;
        
        # Vary header dla Cloudflare cache
        add_header Vary "Accept-Encoding, Origin" always;
        
        # Wyłącz X-Content-Type-Options dla plików statycznych (może blokować przez Cloudflare)
        # Nadpisujemy globalny nagłówek pustą wartością
        add_header X-Content-Type-Options "" always;
        
        # Użyj standardowych typów MIME - ważne dla poprawnego Content-Type
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        
        # Obsługa OPTIONS dla CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;
            add_header Access-Control-Max-Age "86400" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# Server block dla portu 8001 (jeśli potrzebny)
